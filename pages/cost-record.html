        .cost-date {

        .cost-remark {

        .cost-amount {

        .cost-delete {

        .cost-total {

        .cost-total-label {

        .pagination {

        }

    <script src="../js/storage.js"></script>

    <script>
        // µŻĆµ¤źńÖ╗ÕĮ?        var userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        var currentUser = JSON.parse(userStr);
        
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY };
        
        var currentProjectId = '';
        var selectedType = '';
        var currentPage = 1;
        var pageSize = 10;

        function syncFromCloud() {
            fetch(CLOUD_URL + '/rest/v1/projects?companyid=eq.' + currentUser.companyId + '&order=updatedat.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(cloudProjects) {
                    if (cloudProjects && cloudProjects.length > 0) {
                        Storage.set(Storage.KEYS.PROJECTS, cloudProjects.map(function(p) {
                            return { id: p.id, name: p.name, contractAmount: p.contractamount, client: p.client||'', clientContact: p.clientcontact||'', clientPhone: p.clientphone||'', clientAddress: p.clientaddress||'', manager: p.manager||'', managerPhone: p.managerphone||'', startDate: p.startdate||'', endDate: p.enddate||'', status: p.status||'Ķ┐øĶĪīõĖ?, progress: p.progress||0, invoiceType: p.invoicetype||'', taxRate: p.taxrate||'', taxAmount: p.taxamount||0, remark: p.remark||'', createdAt: p.createdat||'', updatedAt: p.updatedat||'' };
                        }));
                    }
                    return fetch(CLOUD_URL + '/rest/v1/costs?companyid=eq.' + currentUser.companyId + '&order=date.desc', { headers: hdrs });
                })
                .then(function(r) { return r.json(); })
                .then(function(cloudCosts) {
                    if (cloudCosts && cloudCosts.length > 0) {
                        Storage.set(Storage.KEYS.COSTS, cloudCosts.map(function(c) {
                            return { id: c.id, projectId: c.projectid, type: c.type, amount: c.amount, date: c.date||'', remark: c.remark||'', createdAt: c.createdat||'' };
                        }));
                    }
                    loadProjects();
                })
                .catch(function(e) { loadProjects(); });
        }

        function loadProjects() {
            var projects = ProjectStore.getAll();
            var select = document.getElementById('project-select');
            var params = Utils.getUrlParams();
            if (params.projectId) currentProjectId = params.projectId;
            select.innerHTML = '<option value="">ķĆēµŗ®ķĪ╣ńø«...</option>' + projects.map(function(p) { return '<option value="' + p.id + '"' + (p.id === currentProjectId ? ' selected' : '') + '>' + p.name + '</option>'; }).join('');
            if (currentProjectId) { currentPage = 1; loadCosts(); }
        }

        function loadCosts() {
            var container = document.getElementById('cost-list');
            var addBtn = document.getElementById('add-btn');
            
            if (!currentProjectId) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">Ķ»ĘÕģłķĆēµŗ®ķĪ╣ńø«</div>';
                addBtn.style.display = 'none';
                return;
            }

            var allCosts = CostStore.getByProjectId(currentProjectId);
            var totalCost = CostStore.getTotalCost(currentProjectId);
            var totalPages = Math.max(1, Math.ceil(allCosts.length / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            
            var start = (currentPage - 1) * pageSize;
            var pageCosts = allCosts.slice(start, start + pageSize);

            if (allCosts.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;"><p style="font-size:48px;margin-bottom:12px;">­¤ōØ</p><p>µÜéµŚĀµłÉµ£¼Ķ«░ÕĮĢ</p><p style="font-size:12px;margin-top:8px;">ńé╣Õć╗ÕÅ│õĖŗĶ¦?+ µĘ╗ÕŖĀ</p></div>';
                addBtn.style.display = 'block';
                return;
            }

            addBtn.style.display = 'block';
            
            var typeLabels = { labor: 'õ║║ÕĘźÕłåÕīģ', material: 'Ķ«ŠÕżćµØÉµ¢Ö', business: 'ÕĢåÕŖĪĶ┤?, machinery: 'µ£║µó░ń¦¤ĶĄü', transport: 'õ║żķĆÜĶ┤╣', other: 'µØéĶ┤╣' };
            var typeIcons = { labor: '­¤æĘ', material: '­¤ō”', business: '­¤żØ', machinery: '­¤Ü£', transport: '­¤ÜŚ', other: '­¤ōŗ' };

            var html = '';
            
            // µłÉµ£¼ÕłŚĶĪ©
            pageCosts.forEach(function(c) {
                html += '<div class="cost-item">' +
                    '<div class="cost-left">' +
                        '<div class="cost-type">' + (typeIcons[c.type]||'­¤ōŗ') + ' ' + (typeLabels[c.type]||c.type) + '</div>' +
                        '<div class="cost-date">' + c.date + '</div>' +
                        (c.remark ? '<div class="cost-remark">' + c.remark + '</div>' : '') +
                    '</div>' +
                    '<div class="cost-amount">┬ź' + parseFloat(c.amount).toLocaleString() + '</div>' +
                    '<div class="cost-delete" onclick="deleteCost(\'' + c.id + '\')">├Ś</div>' +
                '</div>';
            });
            
            // ÕłåķĪĄ
            if (totalPages > 1) {
                html += '<div class="pagination">' +
                    '<button class="page-btn" onclick="prevPage()" ' + (currentPage <= 1 ? 'disabled' : '') + '>õĖŖõĖĆķĪ?/button>' +
                    '<span class="page-info">' + currentPage + ' / ' + totalPages + '</span>' +
                    '<button class="page-btn" onclick="nextPage()" ' + (currentPage >= totalPages ? 'disabled' : '') + '>õĖŗõĖĆķĪ?/button>' +
                '</div>';
            }
            
            // ÕÉłĶ«ĪĶĪ?            html += '<div class="cost-total">' +
                '<span class="cost-total-label">ÕÉłĶ«Ī (' + allCosts.length + 'µØ?</span>' +
                '<span class="cost-total-amount">┬ź' + totalCost.toLocaleString() + '</span>' +
            '</div>';
            
            container.innerHTML = html;
        }

        function prevPage() {
            currentPage--;
            loadCosts();
        }

        function nextPage() {
            currentPage++;
            loadCosts();
        }

        function showModal() {
            selectedType = '';
            document.getElementById('selected-type').textContent = 'Ķ»ĘķĆēµŗ®ń▒╗Õ×ŗ';
            document.getElementById('cost-amount').value = '';
            document.getElementById('cost-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('cost-remark').value = '';
            document.getElementById('add-modal').classList.add('show');
            document.querySelectorAll('.type-btn').forEach(function(btn) { btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; });
        }

        function hideModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        document.querySelectorAll('.type-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                selectedType = this.dataset.type;
                document.querySelectorAll('.type-btn').forEach(function(b) { b.style.background = ''; b.style.color = ''; b.style.borderColor = ''; });
                this.style.background = '#1890ff';
                this.style.color = '#fff';
                this.style.borderColor = '#1890ff';
                var labels = { labor: 'õ║║ÕĘźÕłåÕīģ', material: 'Ķ«ŠÕżćµØÉµ¢Ö', business: 'ÕĢåÕŖĪĶ┤?, machinery: 'µ£║µó░ń¦¤ĶĄü', transport: 'õ║żķĆÜĶ┤╣', other: 'µØéĶ┤╣' };
                document.getElementById('selected-type').textContent = 'ÕĘ▓ķĆ? ' + (labels[selectedType]||'');
            });
        });

        document.getElementById('add-btn').addEventListener('click', showModal);
        document.getElementById('cancel-btn').addEventListener('click', hideModal);
        document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) hideModal(); });

        document.getElementById('save-btn').addEventListener('click', function() {
            var amount = document.getElementById('cost-amount').value;
            var date = document.getElementById('cost-date').value;
            var remark = document.getElementById('cost-remark').value;
            
            if (!selectedType) { Utils.showToast('Ķ»ĘķĆēµŗ®µłÉµ£¼ń▒╗Õ×ŗ'); return; }
            if (!amount || parseFloat(amount) <= 0) { Utils.showToast('Ķ»ĘĶŠōÕģźķćæķó?); return; }
            if (!date) { Utils.showToast('Ķ»ĘķĆēµŗ®µŚźµ£¤'); return; }

            var cost = CostStore.add({ projectId: currentProjectId, type: selectedType, amount: amount, date: date, remark: remark });

            fetch(CLOUD_URL + '/rest/v1/costs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({ id: cost.id, projectid: cost.projectId, type: cost.type, amount: parseFloat(cost.amount) || 0, date: cost.date, remark: cost.remark || '', companyid: currentUser.companyId })
            }).catch(function(e) {});

            Utils.showToast('Ķ«░ÕĮĢµłÉÕŖ¤');
            hideModal();
            loadCosts();
        });

        function deleteCost(id) {
            if (confirm('ńĪ«Õ«ÜĶ”üÕłĀķÖżĶ┐ÖµØĪĶ«░ÕĮĢÕÉŚ’╝?)) {
                CostStore.delete(id);
                fetch(CLOUD_URL + '/rest/v1/costs?id=eq.' + id, { method: 'DELETE', headers: hdrs }).catch(function(e) {});
                Utils.showToast('ÕĘ▓ÕłĀķÖ?);
                loadCosts();
            }
        }

        document.getElementById('project-select').addEventListener('change', function() {
            currentProjectId = this.value;
            currentPage = 1;
            loadCosts();
        });

        syncFromCloud();
    </script>
