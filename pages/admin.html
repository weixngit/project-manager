<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 18px; margin: 0; }
        .admin-tabs { display: flex; background: white; border-bottom: 1px solid #eee; overflow-x: auto; }
        .admin-tab { padding: 14px 16px; text-align: center; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .admin-tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #333; }
        .data-table { width: 100%; background: white; border-radius: 8px; overflow: hidden; font-size: 14px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .data-table th { background: #f8f9fa; font-weight: 500; color: #666; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-admin { background: #fff2e8; color: #fa8c16; }
        .tag-user { background: #e6f7ff; color: #1890ff; }
        .tag-pending { background: #fffbe6; color: #faad14; }
        .btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #52c41a; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .empty-tip { text-align: center; padding: 40px; color: #999; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-box .number { font-size: 24px; font-weight: 600; color: #667eea; }
        .stat-box .label { font-size: 12px; color: #999; margin-top: 4px; }
        
        /* 税票设置 */
        .tax-card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tax-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .tax-card-title { font-size: 15px; font-weight: 500; color: #333; }
        .tax-rate-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .tax-rate-item { text-align: center; padding: 8px; border-radius: 6px; background: #f5f5f5; cursor: pointer; }
        .tax-rate-item:hover { background: #e6f7ff; }
        .tax-rate-item.active { background: #667eea; color: white; }
        .tax-rate-item span { display: block; }
        .tax-rate-item .rate { font-size: 16px; font-weight: 600; }
        .tax-rate-item .label { font-size: 11px; color: #999; margin-top: 2px; }
        .tax-rate-item.active .label { color: rgba(255,255,255,0.8); }
        .tax-custom { display: flex; align-items: center; gap: 8px; }
        .tax-custom input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .add-tax-btn { display: block; width: 100%; padding: 12px; background: #f5f5f5; border: 1px dashed #ddd; border-radius: 8px; color: #666; font-size: 14px; cursor: pointer; text-align: center; margin-top: 12px; }
        .add-tax-btn:hover { background: #f0f0f0; }
        
        /* 用户审批 */
        .user-approval-item { display: flex; align-items: center; padding: 12px; background: white; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .user-approval-item .info { flex: 1; }
        .user-approval-item .username { font-weight: 500; }
        .user-approval-item .company { font-size: 12px; color: #999; margin-top: 2px; }
        .user-approval-item .actions { display: flex; gap: 8px; }
        
        /* 密码修改 */
        .pwd-edit-form { background: white; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
        .pwd-edit-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 管理后台</h1>
        <span onclick="logout()" style="font-size:14px;cursor:pointer;">退出登录</span>
    </div>
    
    <div class="admin-tabs">
        <div class="admin-tab active" data-tab="users">用户管理</div>
        <div class="admin-tab" data-tab="tax">税票设置</div>
        <div class="admin-tab" data-tab="companies">公司管理</div>
        <div class="admin-tab" data-tab="stats">数据统计</div>
    </div>
    
    <!-- 用户管理 -->
    <div class="tab-content active" id="users-tab">
        <div class="section-title">待审核用户</div>
        <div id="pending-users"><div class="empty-tip">加载中...</div></div>
        
        <div class="section-title" style="margin-top:24px;">已审核用户</div>
        <div id="approved-users"><div class="empty-tip">加载中...</div></div>
    </div>
    
    <!-- 税票设置 -->
    <div class="tab-content" id="tax-tab">
        <div class="section-title">开票类型与税率设置</div>
        <div id="tax-settings-list"><div class="empty-tip">加载中...</div></div>
        <button class="add-tax-btn" onclick="addTaxType()">+ 添加开票类型</button>
    </div>
    
    <!-- 公司管理 -->
    <div class="tab-content" id="companies-tab">
        <div class="section-title">公司列表</div>
        <table class="data-table"><thead><tr><th>公司名称</th><th>创建时间</th><th>用户数</th><th>操作</th></tr></thead><tbody id="company-list"><tr><td colspan="4" class="empty-tip">加载中...</td></tr></tbody></table>
    </div>
    
    <!-- 数据统计 -->
    <div class="tab-content" id="stats-tab">
        <div class="section-title">系统概览</div>
        <div class="stats-grid">
            <div class="stat-box"><div class="number" id="stat-companies">0</div><div class="label">公司</div></div>
            <div class="stat-box"><div class="number" id="stat-users">0</div><div class="label">用户</div></div>
            <div class="stat-box"><div class="number" id="stat-projects">0</div><div class="label">项目</div></div>
            <div class="stat-box"><div class="number" id="stat-costs">0</div><div class="label">成本记录</div></div>
        </div>
    </div>

    <script>
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Content-Type': 'application/json' };
        
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) { window.location.href = 'login.html'; }
        var currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'admin') { alert('无权访问'); window.location.href = '../index.html'; }
        
        var taxSettings = [];
        var allUsers = [];
        var allCompanies = [];
        
        // Tab 切换
        document.querySelectorAll('.admin-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById(this.dataset.tab + '-tab').classList.add('active');
            });
        });
        
        function logout() { localStorage.removeItem('pm_user'); window.location.href = 'login.html'; }
        
        // ========== 用户管理 ==========
        function loadUsers() {
            Promise.all([
                fetch(CLOUD_URL + '/rest/v1/users?select=*', { headers: hdrs }).then(function(r) { return r.json(); }),
                fetch(CLOUD_URL + '/rest/v1/companies?select=*', { headers: hdrs }).then(function(r) { return r.json(); })
            ]).then(function(results) {
                allUsers = results[0] || [];
                allCompanies = results[1] || [];
                
                var pending = allUsers.filter(function(u) { return u.approved === false || u.approved === null; });
                var approved = allUsers.filter(function(u) { return u.approved === true; });
                
                renderPendingUsers(pending);
                renderApprovedUsers(approved);
            });
        }
        
        function getCompanyName(companyid) {
            var c = allCompanies.find(function(x) { return x.id === companyid; });
            return c ? c.name : '-';
        }
        
        function renderPendingUsers(users) {
            var container = document.getElementById('pending-users');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无待审核用户</div>';
                return;
            }
            container.innerHTML = users.map(function(u) {
                return '<div class="user-approval-item">' +
                    '<div class="info">' +
                        '<div class="username">' + u.username + '</div>' +
                        '<div class="company">公司: ' + getCompanyName(u.companyid) + '</div>' +
                    '</div>' +
                    '<div class="actions">' +
                        '<button class="btn-small btn-success" onclick="approveUser(\'' + u.id + '\')">通过</button>' +
                        '<button class="btn-small btn-danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function renderApprovedUsers(users) {
            var container = document.getElementById('approved-users');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无已审核用户</div>';
                return;
            }
            container.innerHTML = users.map(function(u) {
                var roleTag = u.role === 'admin' ? '<span class="tag tag-admin">管理员</span>' : '<span class="tag tag-user">普通用户</span>';
                return '<div class="user-approval-item">' +
                    '<div class="info">' +
                        '<div class="username">' + u.username + ' ' + roleTag + '</div>' +
                        '<div class="company">公司: ' + getCompanyName(u.companyid) + '</div>' +
                    '</div>' +
                    '<div class="actions">' +
                        '<button class="btn-small btn-primary" onclick="showEditPwd(\'' + u.id + '\',\'' + u.username + '\')">改密</button>' +
                        (u.role !== 'admin' ? '<button class="btn-small btn-danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' : '') +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function approveUser(userId) {
            fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify({ approved: true })
            }).then(function() { loadUsers(); });
        }
        
        function deleteUser(userId) {
            if (!confirm('确定删除该用户？')) return;
            fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, { method: 'DELETE', headers: hdrs })
                .then(function() { loadUsers(); });
        }
        
        function showEditPwd(userId, username) {
            var pwd = prompt(username + ' 的新密码（留空则不修改）:');
            if (pwd && pwd.length >= 6) {
                var hash = 0;
                for (var i = 0; i < pwd.length; i++) {
                    var char = pwd.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                var pwdHash = 'pm_' + Math.abs(hash).toString(16);
                fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, {
                    method: 'PATCH', headers: hdrs, body: JSON.stringify({ passwordhash: pwdHash })
                }).then(function() { alert('密码已修改'); loadUsers(); });
            } else if (pwd && pwd.length < 6) {
                alert('密码至少6个字符');
            }
        }
        
        // ========== 税票设置 ==========
        var PRESET_RATES = [1, 3, 6, 9, 13, 20];
        
        function loadTaxSettings() {
            fetch(CLOUD_URL + '/rest/v1/taxsettings?order=invoicetype', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    taxSettings = data || [];
                    renderTaxSettings();
                });
        }
        
        function renderTaxSettings() {
            var container = document.getElementById('tax-settings-list');
            if (taxSettings.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无设置，请添加开票类型</div>';
                return;
            }
            container.innerHTML = taxSettings.map(function(t, i) {
                var currentRate = (parseFloat(t.vatrate) || 0) * 100;
                var rateButtons = PRESET_RATES.map(function(r) {
                    var active = Math.abs(currentRate - r) < 0.01 ? 'active' : '';
                    return '<div class="tax-rate-item ' + active + '" onclick="setRate(' + i + ', ' + r + ', this)"><span class="rate">' + r + '%</span><span class="label">预设</span></div>';
                }).join('');
                
                return '<div class="tax-card" data-id="' + t.id + '">' +
                    '<div class="tax-card-header">' +
                        '<input type="text" class="tax-card-title" value="' + (t.invoicetype || '') + '" placeholder="开票类型名称" onchange="updateTaxName(' + i + ', this.value)">' +
                        '<button class="btn-small btn-danger" onclick="deleteTax(\'' + t.id + '\')">删除</button>' +
                    '</div>' +
                    '<div class="tax-rate-grid">' + rateButtons + '</div>' +
                    '<div class="tax-custom">' +
                        '<input type="number" placeholder="自定义税率%" value="' + (PRESET_RATES.indexOf(currentRate) < 0 ? currentRate : '') + '" min="0" max="100" step="0.1" onchange="setRateCustom(' + i + ', this.value)">' +
                        '<span>%</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function setRate(index, rate, el) {
            var t = taxSettings[index];
            if (!t) return;
            var rateDecimal = rate / 100;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + t.id, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify({ vatrate: rateDecimal })
            }).then(function() {
                taxSettings[index].vatrate = rateDecimal;
                renderTaxSettings();
            });
        }
        
        function setRateCustom(index, rate) {
            if (!rate) return;
            var t = taxSettings[index];
            if (!t) return;
            var rateDecimal = parseFloat(rate) / 100;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + t.id, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify({ vatrate: rateDecimal })
            }).then(function() {
                taxSettings[index].vatrate = rateDecimal;
                renderTaxSettings();
            });
        }
        
        function updateTaxName(index, name) {
            var t = taxSettings[index];
            if (!t) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + t.id, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify({ invoicetype: name })
            }).then(function() {
                taxSettings[index].invoicetype = name;
            });
        }
        
        function addTaxType() {
            var name = prompt('请输入开票类型名称（如：增值税专用发票）:');
            if (!name) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings', {
                method: 'POST', headers: hdrs, body: JSON.stringify({ invoicetype: name, vatrate: 0.13 })
            }).then(function(r) { return r.json(); }).then(function() { loadTaxSettings(); });
        }
        
        function deleteTax(id) {
            if (!confirm('确定删除该开票类型？')) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + id, { method: 'DELETE', headers: hdrs }).then(function() { loadTaxSettings(); });
        }
        
        // ========== 数据加载 ==========
        function loadData() {
            fetch(CLOUD_URL + '/rest/v1/companies?select=*&order=created_at.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(companies) {
                    document.getElementById('stat-companies').textContent = companies.length;
                    var tbody = document.getElementById('company-list');
                    if (companies.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty-tip">暂无公司</td></tr>'; return; }
                    tbody.innerHTML = companies.map(function(c) {
                        var userCount = allUsers.filter(function(u) { return u.companyid === c.id; }).length;
                        return '<tr><td>' + c.name + '</td><td>' + new Date(c.created_at).toLocaleDateString() + '</td><td>' + userCount + '</td><td><button class="btn-small btn-danger" onclick="deleteCompany(\'' + c.id + '\')">删除</button></td></tr>';
                    }).join('');
                });
            
            document.getElementById('stat-users').textContent = allUsers.length;
            fetch(CLOUD_URL + '/rest/v1/projects?select=id', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(p) { document.getElementById('stat-projects').textContent = p.length; });
            fetch(CLOUD_URL + '/rest/v1/costs?select=id', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(c) { document.getElementById('stat-costs').textContent = c.length; });
        }
        
        function deleteCompany(id) {
            if (!confirm('确定删除该公司？')) return;
            fetch(CLOUD_URL + '/rest/v1/companies?id=eq.' + id, { method: 'DELETE', headers: hdrs }).then(function() { loadData(); loadUsers(); });
        }
        
        // 初始化
        loadUsers();
        loadTaxSettings();
        loadData();
    </script>
</body>
</html>
