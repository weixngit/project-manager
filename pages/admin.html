<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 18px; margin: 0; }
        .admin-header .logout { font-size: 14px; opacity: 0.9; cursor: pointer; }
        .admin-tabs { display: flex; background: white; border-bottom: 1px solid #eee; overflow-x: auto; }
        .admin-tab { padding: 14px 16px; text-align: center; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .admin-tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #333; }
        .data-table { width: 100%; background: white; border-radius: 8px; overflow: hidden; font-size: 14px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .data-table th { background: #f8f9fa; font-weight: 500; color: #666; }
        .data-table tr:last-child td { border-bottom: none; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-admin { background: #fff2e8; color: #fa8c16; }
        .tag-user { background: #e6f7ff; color: #1890ff; }
        .btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .empty-tip { text-align: center; padding: 40px; color: #999; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-box .number { font-size: 24px; font-weight: 600; color: #667eea; }
        .stat-box .label { font-size: 12px; color: #999; margin-top: 4px; }
        .tax-card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .tax-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tax-card-title { font-size: 15px; font-weight: 500; color: #333; }
        .tax-row { display: flex; align-items: center; margin-bottom: 10px; }
        .tax-label { width: 80px; font-size: 13px; color: #666; }
        .tax-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .tax-input:focus { outline: none; border-color: #667eea; }
        .tax-unit { margin-left: 8px; font-size: 13px; color: #999; }
        .add-tax-btn { display: block; width: 100%; padding: 12px; background: #f5f5f5; border: 1px dashed #ddd; border-radius: 8px; color: #666; font-size: 14px; cursor: pointer; text-align: center; margin-top: 12px; }
        .add-tax-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 管理后台</h1>
        <span class="logout" onclick="logout()">退出登录</span>
    </div>
    
    <div class="admin-tabs">
        <div class="admin-tab active" data-tab="tax">税票设置</div>
        <div class="admin-tab" data-tab="companies">公司管理</div>
        <div class="admin-tab" data-tab="users">用户管理</div>
        <div class="admin-tab" data-tab="stats">数据统计</div>
    </div>
    
    <!-- 税票设置 -->
    <div class="tab-content active" id="tax-tab">
        <div class="section-title">开票类型与税点设置</div>
        <div id="tax-settings-list"><div class="empty-tip">加载中...</div></div>
        <button class="add-tax-btn" onclick="addTaxType()">+ 添加开票类型</button>
    </div>
    
    <!-- 公司管理 -->
    <div class="tab-content" id="companies-tab">
        <div class="stats-grid">
            <div class="stat-box"><div class="number" id="company-count">0</div><div class="label">公司总数</div></div>
            <div class="stat-box"><div class="number" id="project-count">0</div><div class="label">项目总数</div></div>
        </div>
        <div class="section-title">公司列表</div>
        <table class="data-table"><thead><tr><th>公司名称</th><th>创建时间</th><th>用户数</th><th>项目数</th><th>操作</th></tr></thead><tbody id="company-list"><tr><td colspan="5" class="empty-tip">加载中...</td></tr></tbody></table>
    </div>
    
    <!-- 用户管理 -->
    <div class="tab-content" id="users-tab">
        <div class="section-title">用户列表</div>
        <table class="data-table"><thead><tr><th>用户名</th><th>所属公司</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="user-list"><tr><td colspan="5" class="empty-tip">加载中...</td></tr></tbody></table>
    </div>
    
    <!-- 数据统计 -->
    <div class="tab-content" id="stats-tab">
        <div class="section-title">系统概览</div>
        <div class="stats-grid">
            <div class="stat-box"><div class="number" id="stat-companies">0</div><div class="label">公司</div></div>
            <div class="stat-box"><div class="number" id="stat-users">0</div><div class="label">用户</div></div>
            <div class="stat-box"><div class="number" id="stat-projects">0</div><div class="label">项目</div></div>
            <div class="stat-box"><div class="number" id="stat-costs">0</div><div class="label">成本记录</div></div>
        </div>
    </div>

    <script>
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Content-Type': 'application/json' };
        
        // 检查权限
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) { window.location.href = 'login.html'; }
        var currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'admin') { alert('无权访问'); window.location.href = '../index.html'; }
        
        var taxSettings = [];
        
        // Tab 切换
        document.querySelectorAll('.admin-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById(this.dataset.tab + '-tab').classList.add('active');
            });
        });
        
        function logout() { localStorage.removeItem('pm_user'); window.location.href = 'login.html'; }
        
        // ========== 税票设置 ==========
        function loadTaxSettings() {
            fetch(CLOUD_URL + '/rest/v1/taxsettings?order=invoicetype', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    taxSettings = data || [];
                    renderTaxSettings();
                });
        }
        
        function renderTaxSettings() {
            var container = document.getElementById('tax-settings-list');
            if (taxSettings.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无设置，请添加开票类型</div>';
                return;
            }
            
            container.innerHTML = taxSettings.map(function(t, i) {
                return '<div class="tax-card">' +
                    '<div class="tax-card-header">' +
                        '<input type="text" class="tax-input" value="' + (t.invoicetype || '') + '" placeholder="开票类型名称" style="max-width:200px;font-weight:500;" onchange="updateTax(' + i + ', \'invoicetype\', this.value)">' +
                        '<button class="btn-small btn-danger" onclick="deleteTax(\'' + t.id + '\')">删除</button>' +
                    '</div>' +
                    '<div class="tax-row">' +
                        '<span class="tax-label">增值税率</span>' +
                        '<input type="number" class="tax-input" value="' + ((parseFloat(t.vatrate) || 0) * 100).toFixed(2) + '" step="0.01" onchange="updateTax(' + i + ', \'vatrate\', this.value)">' +
                        '<span class="tax-unit">%</span>' +
                    '</div>' +
                    '<div class="tax-row">' +
                        '<span class="tax-label">所得税率</span>' +
                        '<input type="number" class="tax-input" value="' + ((parseFloat(t.incometaxrate) || 0) * 100).toFixed(2) + '" step="0.01" onchange="updateTax(' + i + ', \'incometaxrate\', this.value)">' +
                        '<span class="tax-unit">%</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function addTaxType() {
            var newTax = { invoicetype: '新类型', vatrate: 0, incometaxrate: 0 };
            fetch(CLOUD_URL + '/rest/v1/taxsettings', {
                method: 'POST', headers: hdrs, body: JSON.stringify(newTax)
            }).then(function(r) { return r.json(); }).then(function() { loadTaxSettings(); });
        }
        
        function updateTax(index, field, value) {
            var t = taxSettings[index];
            if (!t) return;
            var updateData = {};
            if (field === 'invoicetype') {
                updateData[field] = value;
            } else {
                updateData[field] = parseFloat(value) / 100;
            }
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + t.id, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify(updateData)
            }).then(function() { taxSettings[index][field] = updateData[field]; });
        }
        
        function deleteTax(id) {
            if (!confirm('确定删除该开票类型？')) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + id, { method: 'DELETE', headers: hdrs }).then(function() { loadTaxSettings(); });
        }
        
        // ========== 数据加载 ==========
        function loadData() {
            fetch(CLOUD_URL + '/rest/v1/companies?select=*&order=created_at.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(companies) {
                    document.getElementById('company-count').textContent = companies.length;
                    document.getElementById('stat-companies').textContent = companies.length;
                    var companyIds = companies.map(function(c) { return c.id; });
                    return Promise.all([
                        companies,
                        fetch(CLOUD_URL + '/rest/v1/users?select=companyid&companyid=in.(' + companyIds.join(',') + ')', { headers: hdrs }).then(function(r) { return r.json(); }),
                        fetch(CLOUD_URL + '/rest/v1/projects?select=companyid&companyid=in.(' + companyIds.join(',') + ')', { headers: hdrs }).then(function(r) { return r.json(); })
                    ]);
                })
                .then(function(results) {
                    var companies = results[0], users = results[1], projects = results[2];
                    document.getElementById('project-count').textContent = projects.length;
                    document.getElementById('stat-projects').textContent = projects.length;
                    var tbody = document.getElementById('company-list');
                    if (companies.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无公司</td></tr>'; return; }
                    tbody.innerHTML = companies.map(function(c) {
                        var userCount = users.filter(function(u) { return u.companyid === c.id; }).length;
                        var projCount = projects.filter(function(p) { return p.companyid === c.id; }).length;
                        return '<tr><td>' + c.name + '</td><td>' + new Date(c.created_at).toLocaleDateString() + '</td><td>' + userCount + '</td><td>' + projCount + '</td><td><button class="btn-small btn-danger" onclick="deleteCompany(\'' + c.id + '\')">删除</button></td></tr>';
                    }).join('');
                });
            
            fetch(CLOUD_URL + '/rest/v1/users?select=*,companies(name)&order=created_at.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(users) {
                    document.getElementById('stat-users').textContent = users.length;
                    var tbody = document.getElementById('user-list');
                    if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无用户</td></tr>'; return; }
                    tbody.innerHTML = users.map(function(u) {
                        var roleClass = u.role === 'admin' ? 'tag-admin' : 'tag-user';
                        var roleText = u.role === 'admin' ? '管理员' : '普通用户';
                        return '<tr><td>' + u.username + '</td><td>' + (u.companies ? u.companies.name : '-') + '</td><td><span class="tag ' + roleClass + '">' + roleText + '</span></td><td>' + new Date(u.created_at).toLocaleDateString() + '</td><td>' + (u.role !== 'admin' ? '<button class="btn-small btn-danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' : '-') + '</td></tr>';
                    }).join('');
                });
            
            fetch(CLOUD_URL + '/rest/v1/costs?select=id', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(costs) { document.getElementById('stat-costs').textContent = costs.length; });
        }
        
        function deleteCompany(id) { if (!confirm('确定删除该公司？')) return; fetch(CLOUD_URL + '/rest/v1/companies?id=eq.' + id, { method: 'DELETE', headers: hdrs }).then(function() { loadData(); }); }
        function deleteUser(id) { if (!confirm('确定删除该用户？')) return; fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + id, { method: 'DELETE', headers: hdrs }).then(function() { loadData(); }); }
        
        // 初始化
        loadTaxSettings();
        loadData();
    </script>
</body>
</html>
