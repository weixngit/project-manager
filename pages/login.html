<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>зҷ»еҪ• - е·ҘзЁӢйЎ№зӣ®з®ЎзҗҶ</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; border-radius: 16px; padding: 32px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-title { text-align: center; margin-bottom: 24px; }
        .login-title h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        .login-title p { color: #999; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn-login:active { opacity: 0.9; }
        .error-msg { color: #ff4d4f; font-size: 13px; margin-top: 4px; display: none; text-align: center; }
        .company-field { display: none; }
        .company-field.show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-title">
                <h1>е·ҘзЁӢйЎ№зӣ®з®ЎзҗҶ</h1>
                <p id="mode-text">иҜ·зҷ»еҪ•жӮЁзҡ„иҙҰпҝ?/p>
            </div>
            
            <form id="login-form">
                <div class="form-group company-field" id="company-group">
                    <label>е…¬еҸёеҗҚз§°</label>
                    <input type="text" id="company" placeholder="иҜ·иҫ“е…Ҙе…¬еҸёеҗҚпҝ? maxlength="50">
                    <div class="error-msg" id="company-error">иҜ·иҫ“е…Ҙе…¬еҸёеҗҚпҝ?/div>
                </div>
                
                <div class="form-group">
                    <label>з”ЁжҲ·пҝ?/label>
                    <input type="text" id="username" placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ" maxlength="20" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label>еҜҶз Ғ</label>
                    <input type="password" id="password" placeholder="иҜ·иҫ“е…ҘеҜҶпҝ? maxlength="20" autocomplete="current-password">
                </div>
                
                <div class="form-group" id="password-confirm-group" style="display:none;">
                    <label>зЎ®и®ӨеҜҶз Ғ</label>
                    <input type="password" id="password-confirm" placeholder="иҜ·еҶҚж¬Ўиҫ“е…ҘеҜҶпҝ? maxlength="20">
                </div>
                
                <div class="form-group" id="role-group">
                    <label>зҷ»еҪ•иә«д»Ҫ</label>
                    <select id="login-role" style="width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box;">
                        <option value="user">жҷ®йҖҡз”Ёпҝ?/option>
                        <option value="admin">з®ЎзҗҶпҝ?/option>
                    </select>
                </div>
                
                <div class="error-msg" id="login-error">з”ЁжҲ·еҗҚжҲ–еҜҶз Ғй”ҷиҜҜ</div>
                
                <button type="submit" class="btn-login" id="submit-btn">зҷ»еҪ•</button>
            </form>
            
            <div class="switch-mode" id="switch-btn" style="text-align:center;margin-top:20px;color:#667eea;font-size:14px;cursor:pointer;">иҝҳжІЎжңүиҙҰеҸ·пјҹз«ӢеҚіжіЁеҶҢ</div>
        </div>
    </div>

    <script>
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Content-Type': 'application/json' };
        
        // жЈҖжҹҘжҳҜеҗҰе·Ізҷ»еҪ•
        var user = localStorage.getItem('pm_user');
        if (user) { window.location.href = '../index.html'; }
        
        var isLoginMode = true;
        var switchBtn = document.getElementById('switch-btn');
        var submitBtn = document.getElementById('submit-btn');
        var modeText = document.getElementById('mode-text');
        var companyGroup = document.getElementById('company-group');
        var roleGroup = document.getElementById('role-group');
        var pwdConfirmGroup = document.getElementById('password-confirm-group');
        var loginError = document.getElementById('login-error');
        
        switchBtn.addEventListener('click', function() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                modeText.textContent = 'иҜ·зҷ»еҪ•жӮЁзҡ„иҙҰпҝ?;
                submitBtn.textContent = 'зҷ»еҪ•';
                switchBtn.textContent = 'иҝҳжІЎжңүиҙҰеҸ·пјҹз«ӢеҚіжіЁеҶҢ';
                companyGroup.classList.remove('show');
                roleGroup.style.display = '';
                pwdConfirmGroup.style.display = 'none';
            } else {
                modeText.textContent = 'жіЁеҶҢж–°иҙҰпҝ?;
                submitBtn.textContent = 'жіЁеҶҢ';
                switchBtn.textContent = 'е·ІжңүиҙҰеҸ·пјҹз«ӢеҚізҷ»пҝ?;
                companyGroup.classList.add('show');
                roleGroup.style.display = 'none';
                pwdConfirmGroup.style.display = '';
            }
            loginError.style.display = 'none';
        });
        
        function hashPassword(pwd) {
            var hash = 0;
            for (var i = 0; i < pwd.length; i++) {
                var char = pwd.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'pm_' + Math.abs(hash).toString(16);
        }
        
        // зҷ»еҪ•
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            loginError.style.display = 'none';
            
            var company = document.getElementById('company').value.trim();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            
            if (!username || !password) {
                loginError.textContent = 'иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚе’ҢеҜҶпҝ?;
                loginError.style.display = 'block';
                return;
            }
            
            if (isLoginMode) {
                // зҷ»еҪ• - зӣҙжҺҘжҹҘиҜўж•°жҚ®пҝ?                submitBtn.textContent = 'зҷ»еҪ•пҝ?..';
                submitBtn.disabled = true;
                
                var pwdHash = hashPassword(password);
                var selectedRole = document.getElementById('login-role').value;
                
                fetch(CLOUD_URL + '/rest/v1/users?username=eq.' + encodeURIComponent(username) + '&select=*', { headers: hdrs })
                    .then(function(r) { 
                        if (!r.ok) throw new Error('иҜ·жұӮеӨұиҙҘ');
                        return r.json(); 
                    })
                    .then(function(users) {
                        console.log('жҹҘиҜўз»“жһң:', users);
                        if (users && users.length > 0) {
                            var u = users[0];
                            console.log('з”ЁжҲ·ж•°жҚ®:', u);
                            console.log('иҫ“е…ҘеҜҶз Ғе“ҲеёҢ:', pwdHash);
                            console.log('ж•°жҚ®еә“еҜҶз Ғе“Ҳпҝ?', u.passwordhash);
                            
                            if (u.passwordhash === pwdHash) {
                                // жЈҖжҹҘи§’иүІжҳҜеҗҰеҢ№пҝ?                                if (u.role !== selectedRole) {
                                    throw new Error('иҜҘз”ЁжҲ·дёҚпҝ? + (selectedRole === 'admin' ? 'з®ЎзҗҶпҝ? : 'жҷ®йҖҡз”Ёпҝ?));
                                }
                                // жЈҖжҹҘжҳҜеҗҰе·Іе®Ўжү№
                                if (u.approved === false) {
                                    throw new Error('иҙҰеҸ·еҫ…е®Ўж ёпјҢиҜ·иҒ”зі»з®ЎзҗҶе‘ҳ');
                                }
                                // иҺ·еҸ–е…¬еҸёдҝЎжҒҜ
                                return fetch(CLOUD_URL + '/rest/v1/companies?id=eq.' + u.companyid, { headers: hdrs })
                                    .then(function(r) { return r.json(); })
                                    .then(function(companies) {
                                        var userData = {
                                            id: u.id,
                                            username: u.username,
                                            role: u.role,
                                            companyId: u.companyid,
                                            companyName: (companies && companies.length > 0) ? companies[0].name : ''
                                        };
                                        localStorage.setItem('pm_user', JSON.stringify(userData));
                                        if (u.role === 'admin') {
                                            window.location.href = 'admin.html';
                                        } else {
                                            window.location.href = '../index.html';
                                        }
                                    });
                            } else {
                                throw new Error('еҜҶз Ғй”ҷиҜҜ');
                            }
                        } else {
                            throw new Error('з”ЁжҲ·дёҚеӯҳпҝ?);
                        }
                    })
                    .catch(function(err) {
                        console.error('зҷ»еҪ•еӨұиҙҘ:', err);
                        loginError.textContent = 'зҷ»еҪ•еӨұиҙҘ: ' + err.message;
                        loginError.style.display = 'block';
                        submitBtn.textContent = 'зҷ»еҪ•';
                        submitBtn.disabled = false;
                    });
            } else {
                // жіЁеҶҢ
                submitBtn.textContent = 'жіЁеҶҢпҝ?..';
                submitBtn.disabled = true;
                
                if (!company) {
                    loginError.textContent = 'иҜ·иҫ“е…Ҙе…¬еҸёеҗҚпҝ?;
                    loginError.style.display = 'block';
                    submitBtn.textContent = 'жіЁеҶҢ';
                    submitBtn.disabled = false;
                    return;
                }
                
                var minLen = /^[\u4e00-\u9fa5]/.test(username) ? 2 : 3;
                if (!username || username.length < minLen) {
                    loginError.textContent = 'з”ЁжҲ·еҗҚиҮіпҝ? + minLen + 'дёӘеӯ—пҝ?;
                    loginError.style.display = 'block';
                    submitBtn.textContent = 'жіЁеҶҢ';
                    submitBtn.disabled = false;
                    return;
                }
                
                if (!password || password.length < 6) {
                    loginError.textContent = 'еҜҶз ҒиҮіе°‘6дёӘеӯ—пҝ?;
                    loginError.style.display = 'block';
                    submitBtn.textContent = 'жіЁеҶҢ';
                    submitBtn.disabled = false;
                    return;
                }
                
                var pwdConfirm = document.getElementById('password-confirm').value;
                if (password !== pwdConfirm) {
                    loginError.textContent = 'дёӨж¬ЎеҜҶз Ғиҫ“е…ҘдёҚдёҖпҝ?;
                    loginError.style.display = 'block';
                    submitBtn.textContent = 'жіЁеҶҢ';
                    submitBtn.disabled = false;
                    return;
                }
                
                var pwdHash = hashPassword(password);
                
                // жЈҖжҹҘз”ЁжҲ·еҗҚжҳҜеҗҰе·Іеӯҳпҝ?                fetch(CLOUD_URL + '/rest/v1/users?username=eq.' + encodeURIComponent(username) + '&select=id', { headers: hdrs })
                    .then(function(r) { return r.json(); })
                    .then(function(existing) {
                        if (existing && existing.length > 0) {
                            throw new Error('з”ЁжҲ·еҗҚе·Іиў«дҪҝпҝ?);
                        }
                        // еҲӣе»әе…¬еҸёпјҲеҰӮжһңе·ІеӯҳеңЁеҲҷдҪҝз”Ёе·Іжңүзҡ„пҝ?                        var companyId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8); return v.toString(16); });
                        return fetch(CLOUD_URL + '/rest/v1/companies', {
                            method: 'POST',
                            headers: hdrs,
                            body: JSON.stringify({ id: companyId, name: company, createdat: new Date().toISOString() })
                        }).then(function(r) {
                            if (r.ok) return r.json();
                            // 409=е…¬еҸёе·ІеӯҳеңЁпјҢжҹҘиҜўе·Іжңүпҝ?                            if (r.status === 409) {
                                return fetch(CLOUD_URL + '/rest/v1/companies?name=eq.' + encodeURIComponent(company) + '&select=id', { headers: hdrs }).then(function(r2) { return r2.json(); });
                            }
                            return r.text().then(function(t) { throw new Error('еҲӣе»әе…¬еҸёеӨұиҙҘ: ' + t); });
                        });
                    })
                    .then(function(newCompany) {
                        if (!newCompany || newCompany.length === 0) throw new Error('еҲӣе»әе…¬еҸёеӨұиҙҘ');
                        // еҲӣе»әз”ЁжҲ·пјҲеҫ…е®Ўжү№пҝ?                        var userId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8); return v.toString(16); });
                        return fetch(CLOUD_URL + '/rest/v1/users', {
                            method: 'POST',
                            headers: hdrs,
                            body: JSON.stringify({
                                id: userId,
                                username: username,
                                passwordhash: pwdHash,
                                companyid: newCompany[0].id,
                                role: 'user',
                                approved: false
                            })
                        });
                    })
                    .then(function(r) {
                        if (!r.ok) throw new Error('еҲӣе»әз”ЁжҲ·еӨұиҙҘ');
                        return r.json();
                    })
                    .then(function() {
                        alert('жіЁеҶҢжҲҗеҠҹпјҢиҜ·зӯүеҫ…з®ЎзҗҶе‘ҳе®Ўж ёеҗҺзҷ»еҪ•');
                        // жё…з©әжіЁеҶҢиЎЁеҚ•
                        document.getElementById('company-name').value = '';
                        document.getElementById('username').value = '';
                        document.getElementById('password').value = '';
                        document.getElementById('password-confirm').value = '';
                        switchBtn.click();
                        submitBtn.textContent = 'зҷ»еҪ•';
                        submitBtn.disabled = false;
                    })
                    .catch(function(err) {
                        loginError.textContent = err.message;
                        loginError.style.display = 'block';
                        submitBtn.textContent = 'жіЁеҶҢ';
                        submitBtn.disabled = false;
                    });
            }
        });
    </script>
</body>
</html>
