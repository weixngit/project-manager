    <link rel="stylesheet" href="../css/style.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            width: 100%;
            max-height: 85vh;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .form-row {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .amount-input {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            padding: 16px;
            border: 2px solid #1890ff;
            border-radius: 12px;
        }
        .save-btn {
            width: 100%;
            padding: 16px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        .cancel-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #666;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
        }
        .payment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
        }
        .payment-left {
            flex: 1;
        }
        .payment-project {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .payment-date {
            font-size: 12px;
            color: #999;
        }
        .payment-amount {
            font-size: 16px;
            font-weight: bold;
            margin-right: 12px;
        }
        .payment-paid {
            color: #52c41a;
        }
        .payment-pending {
            color: #ff4d4f;
        }
        .payment-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .action-btn {
            font-size: 11px;
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-toggle {
            background: #e6f7ff;
            color: #1890ff;
        }
        .action-delete {
            background: #fff1f0;
            color: #ff4d4f;
        }
        .payment-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f6ffed;
            border-top: 2px solid #52c41a;
        }
        .payment-total-label {
            font-size: 14px;
            color: #52c41a;
        }
        .payment-total-amount {
            font-size: 18px;
            font-weight: bold;
            color: #52c41a;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #fff;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            background: #fff;
            font-size: 13px;
        }
        .page-btn:disabled {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <a href="../index.html" class="back-btn">Ōå?/a>
            <h2 class="page-title">Õø×µ¼Šń«ĪńÉå</h2>
        </div>

        <div style="padding: 16px 16px 8px; background: #fff;">
            <button id="add-btn" style="width: 100%; padding: 12px; background: #1890ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold;">+ µĘ╗ÕŖĀÕø×µ¼ŠĶ«░ÕĮĢ</button>
        </div>

        <div style="padding: 0 16px 12px; background: #fff;">
            <select id="project-select" class="form-input">
                <option value="">Õģ©ķā©ķĪ╣ńø«</option>
            </select>
        </div>

        <div class="main-content" style="padding-top: 0;">
            <div id="payment-list"></div>
        </div>
    </div>

    <!-- µ¢░Õó×Õø×µ¼ŠÕ╝╣ń¬Ś -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-box">
            <div class="modal-handle"></div>
            <h3 style="text-align:center;margin-bottom:16px;">µĘ╗ÕŖĀÕø×µ¼Š</h3>
            
            <div class="form-row">
                <label class="form-label">ķĆēµŗ®ķĪ╣ńø«</label>
                <select id="payment-project" class="form-input">
                    <option value="">ķĆēµŗ®ķĪ╣ńø«...</option>
                </select>
            </div>

            <div class="form-row">
                <label class="form-label">ķćæķóØ’╝łÕģā’╝?/label>
                <input type="number" id="payment-amount" class="form-input amount-input" placeholder="0.00" step="0.01">
            </div>

            <div class="form-row">
                <label class="form-label">ķóäĶ«ĪÕø×µ¼ŠµŚźµ£¤</label>
                <input type="date" id="payment-date" class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">Õżćµ│©’╝łķĆēÕĪ½’╝?/label>
                <input type="text" id="payment-remark" class="form-input" placeholder="ĶŠōÕģźÕżćµ│©">
            </div>

            <button class="save-btn" id="save-btn">õ┐ØÕŁś</button>
            <button class="cancel-btn" id="cancel-btn">ÕÅ¢µČł</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // µŻĆµ¤źńÖ╗ÕĮ?        var userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        var currentUser = JSON.parse(userStr);
        
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY };
        
        var currentProjectId = '';
        var currentPage = 1;
        var pageSize = 10;

        function syncFromCloud() {
            fetch(CLOUD_URL + '/rest/v1/projects?companyid=eq.' + currentUser.companyId + '&order=updatedat.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(cloudProjects) {
                    if (cloudProjects && cloudProjects.length > 0) {
                        Storage.set(Storage.KEYS.PROJECTS, cloudProjects.map(function(p) {
                            return { id: p.id, name: p.name, contractAmount: p.contractamount, client: p.client||'', clientContact: p.clientcontact||'', clientPhone: p.clientphone||'', clientAddress: p.clientaddress||'', manager: p.manager||'', managerPhone: p.managerphone||'', startDate: p.startdate||'', endDate: p.enddate||'', status: p.status||'Ķ┐øĶĪīõĖ?, progress: p.progress||0, invoiceType: p.invoicetype||'', taxRate: p.taxrate||'', taxAmount: p.taxamount||0, remark: p.remark||'', createdAt: p.createdat||'', updatedAt: p.updatedat||'' };
                        }));
                    }
                    return fetch(CLOUD_URL + '/rest/v1/payments?companyid=eq.' + currentUser.companyId + '&order=expecteddate.desc', { headers: hdrs });
                })
                .then(function(r) { return r.json(); })
                .then(function(cloudPayments) {
                    if (cloudPayments && cloudPayments.length > 0) {
                        Storage.set(Storage.KEYS.PAYMENTS, cloudPayments.map(function(p) {
                            return { id: p.id, projectId: p.projectid, amount: p.amount, type: p.type||'final', expectedDate: p.expecteddate||'', actualDate: (p.actualdate && p.actualdate !== 'null') ? p.actualdate : '', remark: p.remark||'', createdAt: p.createdat||'' };
                        }));
                    }
                    loadProjects();
                })
                .catch(function(e) { loadProjects(); });
        }

        function loadProjects() {
            var projects = ProjectStore.getAll();
            var select = document.getElementById('project-select');
            var modalSelect = document.getElementById('payment-project');
            select.innerHTML = '<option value="">Õģ©ķā©ķĪ╣ńø«</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            modalSelect.innerHTML = '<option value="">ķĆēµŗ®ķĪ╣ńø«...</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            currentPage = 1;
            loadPayments();
        }

        function loadPayments() {
            var container = document.getElementById('payment-list');
            var allPayments = PaymentStore.getAll();
            
            // filter by project
            if (currentProjectId) {
                allPayments = allPayments.filter(function(p) { return p.projectId === currentProjectId; });
            }
            
            // sort by expected date desc
            allPayments.sort(function(a, b) { return new Date(b.expectedDate || 0) - new Date(a.expectedDate || 0); });
            
            var totalPaid = 0;
            var pendingCount = 0;
            allPayments.forEach(function(p) {
                if (p.actualDate && p.actualDate !== '') {
                    totalPaid += parseFloat(p.amount) || 0;
                } else {
                    pendingCount++;
                }
            });
            
            var totalPages = Math.max(1, Math.ceil(allPayments.length / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pagePayments = allPayments.slice(start, start + pageSize);

            if (allPayments.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;"><p style="font-size:48px;margin-bottom:12px;">­¤Æ░</p><p>µÜéµŚĀÕø×µ¼ŠĶ«░ÕĮĢ</p><p style="font-size:12px;margin-top:8px;">ńé╣Õć╗õĖŖµ¢╣ + µĘ╗ÕŖĀ</p></div>';
                return;
            }

            var html = '';
            pagePayments.forEach(function(p) {
                var project = ProjectStore.getById(p.projectId);
                var projectName = project ? project.name : 'µ£¬ń¤źķĪ╣ńø«';
                var paid = p.actualDate && p.actualDate !== '';
                var displayDate = paid ? ('Õ«×µöČ: ' + p.actualDate) : ('ķóäĶ«Ī: ' + (p.expectedDate || 'µ£¬Ķ«Š'));
                html += '<div class="payment-item">' +
                    '<div class="payment-left">' +
                        '<div class="payment-project">' + projectName + '</div>' +
                        '<div class="payment-date">' + displayDate + (p.remark ? ' | ' + p.remark : '') + '</div>' +
                        '<div class="payment-actions">' +
                            '<button class="action-btn action-toggle" onclick="toggleStatus(\'' + p.id + '\')">' + (paid ? 'µĀćĶ«░ÕŠģµöČµ¼? : 'µĀćĶ«░ÕĘ▓µöČµ¼?) + '</button>' +
                            '<button class="action-btn action-delete" onclick="deletePayment(\'' + p.id + '\')">ÕłĀķÖż</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="payment-amount ' + (paid ? 'payment-paid' : 'payment-pending') + '">┬ź' + parseFloat(p.amount).toLocaleString() + '</div>' +
                '</div>';
            });
            
            if (totalPages > 1) {
                html += '<div class="pagination">' +
                    '<button class="page-btn" onclick="prevPage()" ' + (currentPage <= 1 ? 'disabled' : '') + '>õĖŖõĖĆķĪ?/button>' +
                    '<span style="font-size:13px;color:#666;">' + currentPage + ' / ' + totalPages + '</span>' +
                    '<button class="page-btn" onclick="nextPage()" ' + (currentPage >= totalPages ? 'disabled' : '') + '>õĖŗõĖĆķĪ?/button>' +
                '</div>';
            }
            
            html += '<div class="payment-total">' +
                '<span class="payment-total-label">ÕÉłĶ«Ī’╝? + pendingCount + 'ń¼öÕŠģµöČ’╝ē</span>' +
                '<span class="payment-total-amount">┬ź' + totalPaid.toLocaleString() + '</span>' +
            '</div>';
            
            container.innerHTML = html;
        }

        function prevPage() { currentPage--; loadPayments(); }
        function nextPage() { currentPage++; loadPayments(); }

        function showModal() {
            document.getElementById('payment-project').value = currentProjectId || '';
            document.getElementById('payment-amount').value = '';
            document.getElementById('payment-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('payment-remark').value = '';
            document.getElementById('add-modal').classList.add('show');
        }

        function hideModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        document.getElementById('add-btn').addEventListener('click', showModal);
        document.getElementById('cancel-btn').addEventListener('click', hideModal);
        document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) hideModal(); });

        document.getElementById('save-btn').addEventListener('click', function() {
            var projectId = document.getElementById('payment-project').value;
            var amount = document.getElementById('payment-amount').value;
            var expectedDate = document.getElementById('payment-date').value;
            var remark = document.getElementById('payment-remark').value;
            
            if (!projectId) { Utils.showToast('Ķ»ĘķĆēµŗ®ķĪ╣ńø«'); return; }
            if (!amount || parseFloat(amount) <= 0) { Utils.showToast('Ķ»ĘĶŠōÕģźķćæķó?); return; }
            if (!expectedDate) { Utils.showToast('Ķ»ĘķĆēµŗ®µŚźµ£¤'); return; }

            var payment = PaymentStore.add({ projectId: projectId, amount: amount, expectedDate: expectedDate, remark: remark });

            fetch(CLOUD_URL + '/rest/v1/payments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({ id: payment.id, projectid: payment.projectId, amount: parseFloat(payment.amount) || 0, type: 'final', expecteddate: payment.expectedDate, actualdate: null, remark: payment.remark || '', companyid: currentUser.companyId })
            }).catch(function(e) {});

            Utils.showToast('µĘ╗ÕŖĀµłÉÕŖ¤');
            hideModal();
            loadPayments();
        });

        function toggleStatus(id) {
            var payment = PaymentStore.getById(Storage.KEYS.PAYMENTS, id);
            if (payment) {
                var updates = {};
                if (payment.actualDate && payment.actualDate !== '') {
                    updates.actualDate = '';
                } else {
                    updates.actualDate = new Date().toISOString().split('T')[0];
                }
                PaymentStore.update(id, updates);
                fetch(CLOUD_URL + '/rest/v1/payments?id=eq.' + id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY },
                    body: JSON.stringify({ actualdate: updates.actualDate || null })
                }).catch(function(e) {});
                Utils.showToast(updates.actualDate ? 'ÕĘ▓µĀćĶ«░õĖ║ÕĘ▓µöČµ¼? : 'ÕĘ▓µĀćĶ«░õĖ║ÕŠģµöČµ¼?);
                loadPayments();
            }
        }

        function deletePayment(id) {
            if (confirm('ńĪ«Õ«ÜĶ”üÕłĀķÖżĶ┐ÖµØĪĶ«░ÕĮĢÕÉŚ’╝?)) {
                PaymentStore.delete(id);
                fetch(CLOUD_URL + '/rest/v1/payments?id=eq.' + id, { method: 'DELETE', headers: hdrs }).catch(function(e) {});
                Utils.showToast('ÕĘ▓ÕłĀķÖ?);
                loadPayments();
            }
        }

        document.getElementById('project-select').addEventListener('change', function() {
            currentProjectId = this.value;
            currentPage = 1;
            loadPayments();
        });

        syncFromCloud();
    </script>
</body>
</html>
