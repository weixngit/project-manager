<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新建项目 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <a href="project-list.html" class="back-btn">←</a>
            <h2 class="page-title" id="page-title">新建项目</h2>
        </div>

        <div class="main-content">
            <form id="project-form" class="card">
                <div class="form-group">
                    <label class="form-label">项目名称 *</label>
                    <input type="text" class="form-input" id="name" placeholder="例：XX小区改造项目" required>
                </div>
                <div class="form-group">
                    <label class="form-label">合同金额（元）*</label>
                    <input type="number" class="form-input" id="contractAmount" placeholder="输入合同总金额" required>
                </div>
                <div class="form-group">
                    <label class="form-label">甲方/客户</label>
                    <input type="text" class="form-input" id="client" placeholder="甲方公司名称">
                </div>
                <div class="form-group">
                    <label class="form-label">甲方联系人</label>
                    <input type="text" class="form-input" id="clientContact" placeholder="甲方联系人姓名">
                </div>
                <div class="form-group">
                    <label class="form-label">甲方联系电话</label>
                    <input type="tel" class="form-input" id="clientPhone" placeholder="甲方联系电话">
                </div>
                <div class="form-group">
                    <label class="form-label">甲方收件地址</label>
                    <textarea class="form-input" id="clientAddress" placeholder="用于快递合同、发票等文档" rows="2" style="resize:none;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">负责人</label>
                    <input type="text" class="form-input" id="manager" placeholder="项目负责人">
                </div>
                <div class="form-group">
                    <label class="form-label">负责人电话</label>
                    <input type="tel" class="form-input" id="managerPhone" placeholder="负责人联系电话">
                </div>
                <div class="form-group">
                    <label class="form-label">开工日期</label>
                    <input type="date" class="form-input" id="startDate">
                </div>
                <div class="form-group">
                    <label class="form-label">预计完工日期</label>
                    <input type="date" class="form-input" id="endDate">
                </div>
                <div class="form-group">
                    <label class="form-label">项目状态</label>
                    <select class="form-select" id="status">
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                        <option value="已暂停">已暂停</option>
                        <option value="已取消">已取消</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">进度（%）</label>
                    <input type="range" id="progress" min="0" max="100" value="0" style="width:100%;">
                    <div style="text-align:center;color:#666;font-size:14px;" id="progress-value">0%</div>
                </div>
                <div class="form-group">
                    <label class="form-label">发票类型</label>
                    <select class="form-select" id="invoiceType">
                        <option value="">选择发票类型</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">税率点数</label>
                    <select class="form-select" id="taxRate">
                        <option value="">选择税率</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">预计税费（元）</label>
                    <input type="number" class="form-input" id="taxAmount" placeholder="根据税率自动计算" readonly style="background:#f5f5f5;">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-input" id="remark" placeholder="其他备注信息" rows="3" style="resize:none;"></textarea>
                </div>
                <div style="display:flex;gap:12px;margin-top:24px;">
                    <button type="button" class="btn btn-block" style="background:#f5f5f5;color:#666;" onclick="history.back()">取消</button>
                    <button type="submit" class="btn btn-primary btn-block">保存</button>
                </div>
                <button type="button" id="delete-btn" class="btn btn-danger btn-block" style="margin-top:12px;display:none;">删除项目</button>
            </form>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) { window.location.href = 'login.html'; }
        var currentUser = JSON.parse(userStr);
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Content-Type': 'application/json' };
        
        var params = Utils.getUrlParams();
        var projectId = params.id;
        var isEdit = false;
        
        // 加载发票类型和税率
        function loadTaxSettings() {
            fetch(CLOUD_URL + '/rest/v1/taxsettings?select=*', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    data = data || [];
                    var invTypes = data.filter(function(t) { return t.type === 'invoice_type'; });
                    var rates = data.filter(function(t) { return t.type === 'tax_rate'; });
                    
                    document.getElementById('invoiceType').innerHTML = '<option value="">选择发票类型</option>' + 
                        invTypes.map(function(t) { return '<option value="' + t.name + '">' + t.name + '</option>'; }).join('');
                    
                    document.getElementById('taxRate').innerHTML = '<option value="">选择税率</option>' + 
                        rates.map(function(t) { return '<option value="' + t.rate + '">' + (parseFloat(t.rate) * 100) + '%</option>'; }).join('');
                    
                    if (isEdit) {
                        var project = ProjectStore.getById(projectId);
                        if (project) {
                            document.getElementById('invoiceType').value = project.invoiceType || '';
                            document.getElementById('taxRate').value = project.taxRate || '';
                            calculateTax();
                        }
                    }
                });
        }
        
        function calculateTax() {
            var amount = parseFloat(document.getElementById('contractAmount').value) || 0;
            var rate = parseFloat(document.getElementById('taxRate').value) || 0;
            document.getElementById('taxAmount').value = Math.round(amount * rate);
        }
        
        document.getElementById('progress').addEventListener('input', function() {
            document.getElementById('progress-value').textContent = this.value + '%';
        });
        
        document.getElementById('contractAmount').addEventListener('input', calculateTax);
        document.getElementById('taxRate').addEventListener('change', calculateTax);
        
        loadTaxSettings();

        if (projectId) {
            isEdit = true;
            document.getElementById('page-title').textContent = '编辑项目';
            var project = ProjectStore.getById(projectId);
            if (project) {
                document.getElementById('name').value = project.name || '';
                document.getElementById('contractAmount').value = project.contractAmount || '';
                document.getElementById('client').value = project.client || '';
                document.getElementById('clientContact').value = project.clientContact || '';
                document.getElementById('clientPhone').value = project.clientPhone || '';
                document.getElementById('clientAddress').value = project.clientAddress || '';
                document.getElementById('manager').value = project.manager || '';
                document.getElementById('managerPhone').value = project.managerPhone || '';
                document.getElementById('startDate').value = project.startDate || '';
                document.getElementById('endDate').value = project.endDate || '';
                document.getElementById('status').value = project.status || '进行中';
                document.getElementById('progress').value = project.progress || 0;
                document.getElementById('progress-value').textContent = (project.progress || 0) + '%';
                document.getElementById('invoiceType').value = project.invoiceType || '';
                document.getElementById('taxRate').value = project.taxRate || '';
                document.getElementById('taxAmount').value = project.taxAmount || '';
                document.getElementById('remark').value = project.remark || '';
                document.getElementById('delete-btn').style.display = 'block';
            }
        }

        document.getElementById('project-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var data = {
                name: document.getElementById('name').value.trim(),
                contractAmount: document.getElementById('contractAmount').value,
                client: document.getElementById('client').value.trim(),
                clientContact: document.getElementById('clientContact').value.trim(),
                clientPhone: document.getElementById('clientPhone').value.trim(),
                clientAddress: document.getElementById('clientAddress').value.trim(),
                manager: document.getElementById('manager').value.trim(),
                managerPhone: document.getElementById('managerPhone').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                status: document.getElementById('status').value,
                progress: parseInt(document.getElementById('progress').value),
                invoiceType: document.getElementById('invoiceType').value,
                taxRate: document.getElementById('taxRate').value,
                taxAmount: document.getElementById('taxAmount').value,
                remark: document.getElementById('remark').value.trim()
            };

            if (!data.name) { Utils.showToast('请输入项目名称'); return; }
            if (!data.contractAmount) { Utils.showToast('请输入合同金额'); return; }

            if (isEdit) {
                ProjectStore.update(projectId, data);
                fetch(CLOUD_URL + '/rest/v1/projects?id=eq.' + projectId, {
                    method: 'PATCH',
                    headers: hdrs,
                    body: JSON.stringify({
                        name: data.name, contract_amount: data.contractAmount, client: data.client, 
                        client_contact: data.clientContact, client_phone: data.clientPhone, 
                        client_address: data.clientAddress, manager: data.manager, 
                        manager_phone: data.managerPhone, start_date: data.startDate, 
                        end_date: data.endDate, status: data.status, progress: data.progress, 
                        invoice_type: data.invoiceType, tax_rate: data.taxRate, tax_amount: data.taxAmount, 
                        remark: data.remark, updated_at: new Date().toISOString()
                    })
                }).catch(function(e) {});
                Utils.showToast('保存成功');
            } else {
                var project = ProjectStore.add(data);
                fetch(CLOUD_URL + '/rest/v1/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'return=representation' },
                    body: JSON.stringify({
                        id: project.id, name: project.name, contract_amount: project.contractAmount,
                        client: project.client||'', client_contact: project.clientContact||'',
                        client_phone: project.clientPhone||'', client_address: project.clientAddress||'',
                        manager: project.manager||'', manager_phone: project.managerPhone||'',
                        start_date: project.startDate||null, end_date: project.endDate||null,
                        status: project.status||'进行中', progress: project.progress||0,
                        invoice_type: project.invoiceType||'', tax_rate: project.taxRate||0, tax_amount: project.taxAmount||0,
                        remark: project.remark||'',
                        companyid: currentUser.companyId
                    })
                }).then(function(r) {
                    if (r.ok) { Utils.showToast('创建成功'); }
                    else { Utils.showToast('云端同步失败'); }
                }).catch(function() {});
            }
            setTimeout(function() { location.href = 'project-list.html'; }, 500);
        });

        document.getElementById('delete-btn').addEventListener('click', function() {
            if (confirm('确定要删除这个项目吗？')) {
                ProjectStore.delete(projectId);
                Utils.showToast('已删除');
                setTimeout(function() { location.href = 'project-list.html'; }, 500);
            }
        });
    </script>
</body>
</html>
