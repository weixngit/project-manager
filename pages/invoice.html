    <div class="modal-overlay" id="add-modal">

                    <button class="type-btn" data-type="Õ╝ĆÕć║õĖō" id="type-out-zh">Õ╝ĆÕć║’╝łõĖō’╝ē</button>

    <script src="../js/storage.js"></script>

    <script>
        // µŻĆµ¤źńÖ╗ÕĮ?        var userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        var currentUser = JSON.parse(userStr);
        
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY };
        
        var currentProjectId = '';
        var selectedType = 'µöČÕł░';
        var currentPage = 1;
        var pageSize = 10;

        function syncFromCloud() {
            fetch(CLOUD_URL + '/rest/v1/projects?companyid=eq.' + currentUser.companyId + '&order=updatedat.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(cloudProjects) {
                    if (cloudProjects && cloudProjects.length > 0) {
                        Storage.set(Storage.KEYS.PROJECTS, cloudProjects.map(function(p) {
                            return { id: p.id, name: p.name, contractAmount: p.contractamount, client: p.client||'', clientContact: p.clientcontact||'', clientPhone: p.clientphone||'', clientAddress: p.clientaddress||'', manager: p.manager||'', managerPhone: p.managerphone||'', startDate: p.startdate||'', endDate: p.enddate||'', status: p.status||'Ķ┐øĶĪīõĖ?, progress: p.progress||0, invoiceType: p.invoicetype||'', taxAmount: p.taxamount||0, remark: p.remark||'', createdAt: p.createdat||'', updatedAt: p.updatedat||'' };
                        }));
                    }
                    return fetch(CLOUD_URL + '/rest/v1/invoices?companyid=eq.' + currentUser.companyId + '&order=date.desc', { headers: hdrs });
                })
                .then(function(r) { return r.json(); })
                .then(function(cloudInvoices) {
                    if (cloudInvoices && cloudInvoices.length > 0) {
                        Storage.set(Storage.KEYS.INVOICES, cloudInvoices.map(function(i) {
                            return { id: i.id, projectId: i.projectid, type: i.type, amount: i.amount, number: i.number||'', date: i.date||'', party: i.party||'', remark: i.remark||'', createdAt: i.createdat||'' };
                        }));
                    }
                    loadProjects();
                })
                .catch(function(e) { loadProjects(); });
        }

        function loadProjects() {
            var projects = ProjectStore.getAll();
            var select = document.getElementById('project-select');
            var modalSelect = document.getElementById('invoice-project');
            select.innerHTML = '<option value="">Õģ©ķā©ķĪ╣ńø«</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            modalSelect.innerHTML = '<option value="">ķĆēµŗ®ķĪ╣ńø«...</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            currentPage = 1;
            loadInvoices();
        }

        function loadInvoices() {
            var container = document.getElementById('invoice-list');
            var allInvoices = InvoiceStore.getAll();
            
            if (currentProjectId) {
                allInvoices = allInvoices.filter(function(i) { return i.projectId === currentProjectId; });
            }
            
            allInvoices.sort(function(a, b) { return new Date(b.date || 0) - new Date(a.date || 0); });
            
            var totalIn = 0;
            var totalOut = 0;
            allInvoices.forEach(function(i) {
                if (i.type === 'µöČÕł░µÖ? || i.type === 'µöČÕł░õĖ?) {
                    totalIn += parseFloat(i.amount) || 0;
                } else {
                    totalOut += parseFloat(i.amount) || 0;
                }
            });
            
            var totalPages = Math.max(1, Math.ceil(allInvoices.length / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pageInvoices = allInvoices.slice(start, start + pageSize);

            if (allInvoices.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;"><p style="font-size:48px;margin-bottom:12px;">­¤¦Š</p><p>µÜéµŚĀńź©µŹ«Ķ«░ÕĮĢ</p><p style="font-size:12px;margin-top:8px;">ńé╣Õć╗õĖŖµ¢╣ + µĘ╗ÕŖĀ</p></div>';
                return;
            }

            var typeIcons = { 'µöČÕł░µÖ?: '­¤ōźµÖ?, 'µöČÕł░õĖ?: '­¤ōźõĖ?, 'Õ╝ĆÕć║µÖ«': '­¤ōżµÖ?, 'Õ╝ĆÕć║õĖō': '­¤ōżõĖ? };
            var typeColors = { 'µöČÕł░µÖ?: '#52c41a', 'µöČÕł░õĖ?: '#1890ff', 'Õ╝ĆÕć║µÖ«': '#fa8c16', 'Õ╝ĆÕć║õĖō': '#ff4d4f' };
            
            var html = '';
            pageInvoices.forEach(function(i) {
                var project = ProjectStore.getById(i.projectId);
                var projectName = project ? project.name : 'µ£¬ń¤źķĪ╣ńø«';
                var isIn = i.type === 'µöČÕł░µÖ? || i.type === 'µöČÕł░õĖ?;
                var icon = typeIcons[i.type] || i.type;
                var color = typeColors[i.type] || '#666';
                html += '<div class="invoice-item">' +
                    '<div class="invoice-left">' +
                        '<div class="invoice-project"><span style="color:' + color + ';font-weight:bold;">' + icon + '</span> ' + projectName + ' <span style="font-size:11px;color:#666;background:#f0f0f0;padding:2px 6px;border-radius:4px;">' + i.type + '</span></div>' +
                        '<div class="invoice-info">' + i.date + (i.number ? ' | ' + i.number : '') + (i.party ? ' | ' + i.party : '') + '</div>' +
                    '</div>' +
                    '<div class="invoice-amount ' + (isIn ? 'invoice-in' : 'invoice-out') + '">┬ź' + parseFloat(i.amount).toLocaleString() + '</div>' +
                    '<div class="invoice-delete" onclick="deleteInvoice(\'' + i.id + '\')">├Ś</div>' +
                '</div>';
            });
            
            if (totalPages > 1) {
                html += '<div class="pagination">' +
                    '<button class="page-btn" onclick="prevPage()" ' + (currentPage <= 1 ? 'disabled' : '') + '>õĖŖõĖĆķĪ?/button>' +
                    '<span style="font-size:13px;color:#666;">' + currentPage + ' / ' + totalPages + '</span>' +
                    '<button class="page-btn" onclick="nextPage()" ' + (currentPage >= totalPages ? 'disabled' : '') + '>õĖŗõĖĆķĪ?/button>' +
                '</div>';
            }
            
            html += '<div class="invoice-total">' +
                '<span class="invoice-total-label">µöČÕł░: ┬ź' + totalIn.toLocaleString() + ' | Õ╝ĆÕć? ┬ź' + totalOut.toLocaleString() + '</span>' +
            '</div>';
            
            container.innerHTML = html;
        }

        function prevPage() { currentPage--; loadInvoices(); }
        function nextPage() { currentPage++; loadInvoices(); }

        function showModal() {
            document.getElementById('invoice-project').value = currentProjectId || '';
            document.getElementById('invoice-amount').value = '';
            document.getElementById('invoice-number').value = '';
            document.getElementById('invoice-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('invoice-party').value = '';
            document.getElementById('invoice-remark').value = '';
            
            // ķ╗śĶ«żÕ╝ĆÕć║µÖ«
            selectedType = 'Õ╝ĆÕć║µÖ«';
            updateTypeButtons();
            document.getElementById('add-modal').classList.add('show');
        }
        
        function updateTypeButtons() {
            document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('selected'); });
            var btn = document.querySelector('[data-type="' + selectedType + '"]');
            if (btn) btn.classList.add('selected');
        }

        function hideModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        document.getElementById('add-btn').addEventListener('click', showModal);
        document.getElementById('cancel-btn').addEventListener('click', hideModal);
        document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) hideModal(); });

        document.getElementById('type-in-pu').addEventListener('click', function() { selectType('µöČÕł░µÖ?); });
        document.getElementById('type-in-zh').addEventListener('click', function() { selectType('µöČÕł░õĖ?); });
        document.getElementById('type-out-pu').addEventListener('click', function() { selectType('Õ╝ĆÕć║µÖ«'); });
        document.getElementById('type-out-zh').addEventListener('click', function() { selectType('Õ╝ĆÕć║õĖō'); });
        
        function selectType(type) {
            selectedType = type;
            document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('selected'); });
            document.querySelector('[data-type="' + type + '"]').classList.add('selected');
        }

        document.getElementById('save-btn').addEventListener('click', function() {
            var projectId = document.getElementById('invoice-project').value;
            var amount = parseFloat(document.getElementById('invoice-amount').value) || 0;
            var number = document.getElementById('invoice-number').value;
            var date = document.getElementById('invoice-date').value;
            var party = document.getElementById('invoice-party').value;
            var remark = document.getElementById('invoice-remark').value;
            
            if (!projectId) { Utils.showToast('Ķ»ĘķĆēµŗ®ķĪ╣ńø«'); return; }
            if (!amount || amount <= 0) { Utils.showToast('Ķ»ĘĶŠōÕģźķćæķó?); return; }
            if (!date) { Utils.showToast('Ķ»ĘķĆēµŗ®µŚźµ£¤'); return; }

            var invoice = InvoiceStore.add({ projectId: projectId, type: selectedType, amount: amount, number: number, date: date, party: party, remark: remark });

            // Ķ«Īń«Śń©ÄĶ┤╣
            var project = ProjectStore.getById(projectId);
            var taxRate = project ? (parseFloat(project.taxRate) || 0) : 0;
            var taxAmount = 0;
            var taxRemark = '';
            
            if (selectedType === 'Õ╝ĆÕć║µÖ«') {
                // µÖ«ķĆÜÕÅæńź©’╝Üń©ÄĶ┤╣ = Õ╝Ćńź©ķćæķó?├Ś ń©ÄńÄć
                taxAmount = Math.round(amount * taxRate);
                taxRemark = 'ķöĆķĪ╣ń©Ä’╝łµÖ«ńź©’╝ē';
            } else if (selectedType === 'Õ╝ĆÕć║õĖō') {
                // õĖōńö©ÕÅæńź©’╝Üń©ÄĶ┤?= (Õ╝ĆÕć║ķćæķó?- µöČÕł░õĖōńź©ķćæķóØ) ├Ś ń©ÄńÄć
                var allInvoices = InvoiceStore.getByProject(projectId);
                var inputZhAmount = 0;
                allInvoices.filter(function(i) { return i.type === 'µöČÕł░õĖ?; }).forEach(function(i) { inputZhAmount += parseFloat(i.amount) || 0; });
                var taxableAmount = Math.max(0, amount - inputZhAmount);
                taxAmount = Math.round(taxableAmount * taxRate);
                taxRemark = 'ķöĆķĪ╣ń©Ä’╝łõĖōńź©’╝ē- Ķ┐øķĪ╣µŖĄµēŻ ' + inputZhAmount.toLocaleString();
            }
            // µöČÕł░µÖ?µöČÕł░õĖ?õĖŹõ║¦ńö¤ń©ÄĶ┤?
            // Õ”éµ×£µ£ēń©ÄĶ┤╣’╝īµĘ╗ÕŖĀÕł░µłÉµ£?            if (taxAmount > 0) {
                var taxCost = CostStore.add({
                    projectId: projectId,
                    type: 'other',
                    amount: taxAmount,
                    date: date,
                    remark: taxRemark
                });
                
                fetch(CLOUD_URL + '/rest/v1/costs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                    body: JSON.stringify({ id: taxCost.id, projectid: taxCost.projectId, type: taxCost.type, amount: taxCost.amount, date: taxCost.date, remark: taxCost.remark || '', companyid: currentUser.companyId })
                }).catch(function(e) {});
                
                Utils.showToast('µĘ╗ÕŖĀµłÉÕŖ¤’╝īń©ÄĶ┤?┬ź' + taxAmount.toLocaleString() + ' ÕĘ▓Ķ«ĪÕģźµłÉµ£?);
            } else {
                Utils.showToast('µĘ╗ÕŖĀµłÉÕŖ¤');
            }

            // ÕÉīµŁźÕÅæńź©Õł░õ║æń½?            fetch(CLOUD_URL + '/rest/v1/invoices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({ id: invoice.id, projectid: invoice.projectId, type: invoice.type, amount: invoice.amount, number: invoice.number || '', date: invoice.date, party: invoice.party || '', remark: invoice.remark || '', companyid: currentUser.companyId })
            }).catch(function(e) {});

            hideModal();
            loadInvoices();
        });

        function deleteInvoice(id) {
            if (confirm('ńĪ«Õ«ÜĶ”üÕłĀķÖżĶ┐ÖµØĪĶ«░ÕĮĢÕÉŚ’╝?)) {
                InvoiceStore.delete(id);
                fetch(CLOUD_URL + '/rest/v1/invoices?id=eq.' + id, { method: 'DELETE', headers: hdrs }).catch(function(e) {});
                Utils.showToast('ÕĘ▓ÕłĀķÖ?);
                loadInvoices();
            }
        }

        document.getElementById('project-select').addEventListener('change', function() {
            currentProjectId = this.value;
            currentPage = 1;
            loadInvoices();
        });

        syncFromCloud();
    </script>
