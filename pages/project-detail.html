<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>项目详情 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <a href="project-list.html" class="back-btn">←</a>
            <h2 class="page-title" id="project-name">项目详情</h2>
            <a href="#" id="edit-link" style="margin-left: auto; color: #1890ff; text-decoration: none;">编辑</a>
        </div>

        <div class="main-content" id="content-area"><div class="empty-tip">加载中...</div></div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 检查登录
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        var currentUser = JSON.parse(userStr);
        
        const CLOUD = { url: 'https://azspvriaxhlllgtphwgv.supabase.co', key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc' };
        const hdrs = { 'apikey': CLOUD.key, 'Authorization': 'Bearer ' + CLOUD.key };
        
        const params = Utils.getUrlParams();
        const projectId = params.id;

        if (!projectId) location.href = 'project-list.html';

        async function syncFromCloud() {
            try {
                const rp = await fetch(CLOUD.url + '/rest/v1/projects?order=updated_at.desc', { headers: hdrs });
                const projects = await rp.json();
                if (projects && projects.length > 0) Storage.set(Storage.KEYS.PROJECTS, projects.map(p => ({ id: p.id, name: p.name, contractAmount: p.contract_amount, client: p.client||'', clientContact: p.client_contact||'', clientPhone: p.client_phone||'', clientAddress: p.client_address||'', manager: p.manager||'', managerPhone: p.manager_phone||'', startDate: p.start_date||'', endDate: p.end_date||'', status: p.status||'进行中', progress: p.progress||0, invoiceType: p.invoice_type||'', taxAmount: p.tax_amount||0, remark: p.remark||'', createdAt: p.created_at||'', updatedAt: p.updated_at||'' })));
                
                const rc = await fetch(CLOUD.url + '/rest/v1/costs?order=created_at.desc', { headers: hdrs });
                const costs = await rc.json();
                if (costs && costs.length > 0) Storage.set(Storage.KEYS.COSTS, costs.map(c => ({ id: c.id, projectId: c.project_id, type: c.type, amount: c.amount, date: c.date||'', remark: c.remark||'', createdAt: c.created_at||'' })));
                
                const rpay = await fetch(CLOUD.url + '/rest/v1/payments?order=expected_date.desc', { headers: hdrs });
                const payments = await rpay.json();
                if (payments && payments.length > 0) Storage.set(Storage.KEYS.PAYMENTS, payments.map(p => ({ id: p.id, projectId: p.project_id, amount: p.amount, type: p.type||'final', expectedDate: p.expected_date||'', actualDate: (p.actual_date && p.actual_date !== 'null') ? p.actual_date : '', status: p.status||'待收款', remark: p.remark||'', createdAt: p.created_at||'' })));
                
                const ri = await fetch(CLOUD.url + '/rest/v1/invoices?order=created_at.desc', { headers: hdrs });
                const invoices = await ri.json();
                if (invoices && invoices.length > 0) Storage.set(Storage.KEYS.INVOICES, invoices.map(i => ({ id: i.id, projectId: i.project_id, type: i.type, amount: i.amount, number: i.number||'', date: i.date||'', party: i.party||'', remark: i.remark||'', createdAt: i.created_at||'' })));
            } catch(e) { console.error('同步失败', e); }
        }

        function renderDetail() {
            const project = ProjectStore.getById(projectId);
            if (!project) { document.getElementById('content-area').innerHTML = '<div class="empty-tip">项目不存在</div>'; return; }

            document.getElementById('project-name').textContent = project.name;
            document.getElementById('edit-link').href = 'project-edit.html?id=' + projectId;

            const totalPaid = PaymentStore.getTotalPaid(projectId);
            const totalPending = PaymentStore.getTotalPending(projectId);
            const profit = Utils.calculateProfit(projectId);
            const costStats = CostStore.getStatsByType(projectId);
            const invoiceStats = InvoiceStore.getInvoiceStats(projectId);
            const costs = CostStore.getByProjectId(projectId);
            const payments = PaymentStore.getByProjectId(projectId);
            const isProfit = profit && profit.profit >= 0;

            const typeLabels = { labor: '人工分包', material: '设备材料', business: '商务费', machinery: '机械租赁', transport: '交通费', other: '杂费' };

            const html = `
                <div class="card">
                    <h3 style="margin-bottom:12px;">盈亏概览</h3>
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
                        <div><div style="font-size:12px;color:#999;">合同金额</div><div class="amount amount-medium">${Utils.formatMoney(project.contractAmount)}</div></div>
                        <div><div style="font-size:12px;color:#999;">已回款</div><div class="amount amount-medium">${Utils.formatMoney(totalPaid)}</div></div>
                        <div><div style="font-size:12px;color:#999;">总成本</div><div class="amount" style="color:#ff4d4f;">${Utils.formatMoney(profit ? profit.totalCost : 0)}</div></div>
                        <div><div style="font-size:12px;color:#999;">待回款</div><div class="amount" style="color:#faad14;">${Utils.formatMoney((project.contractAmount||0) - totalPaid)}</div></div>
                    </div>
                    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-size:14px;font-weight:600;">净利润</span>
                            <span class="amount amount-large" style="color:${isProfit ? '#52c41a' : '#ff4d4f'};">${profit ? Utils.formatMoney(Math.abs(profit.profit)) : '¥0'}${isProfit ? '' : ' (亏)'}</span>
                        </div>
                        <div style="font-size:12px;color:#999;margin-top:4px;">利润率: ${profit ? profit.profitRate : 0}%</div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom:12px;">项目进度</h3>
                    <div class="progress-bar" style="height:12px;"><div class="progress-fill" style="width:${project.progress||0}%;"></div></div>
                    <div style="display:flex;justify-content:space-between;margin-top:8px;">
                        <span class="tag ${Utils.getStatusTag(project.status)}">${project.status}</span>
                        <span style="font-size:14px;font-weight:600;">${project.progress||0}%</span>
                    </div>
                </div>

                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3>成本分布</h3>
                        <a href="cost-record.html?projectId=${projectId}" style="font-size:13px;color:#1890ff;text-decoration:none;">记录成本 →</a>
                    </div>
                    ${Object.keys(costStats).length === 0 ? '<div style="text-align:center;color:#999;padding:20px;">暂无成本记录</div>' : Object.entries(costStats).map(([t, a]) => '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;"><span style="font-size:13px;">' + (typeLabels[t]||t) + '</span><span style="font-size:13px;color:#ff4d4f;">' + Utils.formatMoney(a) + '</span></div>').join('')}
                </div>

                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3>回款情况</h3>
                        <a href="payment.html?projectId=${projectId}" style="font-size:13px;color:#1890ff;text-decoration:none;">管理回款 →</a>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
                        <div style="background:#f6ffed;padding:12px;border-radius:8px;"><div style="font-size:12px;color:#52c41a;">已收款</div><div class="amount">${Utils.formatMoney(totalPaid)}</div></div>
                        <div style="background:#fff7e6;padding:12px;border-radius:8px;"><div style="font-size:12px;color:#faad14;">待收款</div><div class="amount">${Utils.formatMoney(totalPending)}</div></div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom:12px;">项目信息</h3>
                    <div style="font-size:14px;color:#666;line-height:2;">
                        <div><strong>甲方：</strong>${project.client||'-'}</div>
                        <div><strong>联系人：</strong>${project.clientContact||'-'} ${project.clientPhone?'('+project.clientPhone+')':''}</div>
                        <div><strong>负责人：</strong>${project.manager||'-'} ${project.managerPhone?'('+project.managerPhone+')':''}</div>
                        <div><strong>开票类型：</strong>${project.invoiceType==='general'?'一般纳税人':project.invoiceType==='small'?'小规模纳税人':'-'}</div>
                        <div><strong>预计税费：</strong>${Utils.formatMoney(project.taxAmount)}</div>
                        <div><strong>开始/结束：</strong>${project.startDate||'-'} / ${project.endDate||'-'}</div>
                        ${project.remark?'<div><strong>备注：</strong>'+project.remark+'</div>':''}
                    </div>
                </div>
            `;

            document.getElementById('content-area').innerHTML = html;
        }

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) syncFromCloud().then(() => renderDetail());
        });

        syncFromCloud().then(() => renderDetail());
    </script>
</body>
</html>
