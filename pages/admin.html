<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 18px; margin: 0; }
        .admin-tabs { display: flex; background: white; border-bottom: 1px solid #eee; overflow-x: auto; }
        .admin-tab { padding: 14px 16px; text-align: center; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .admin-tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #333; }
        .data-table { width: 100%; background: white; border-radius: 8px; overflow: hidden; font-size: 14px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .data-table th { background: #f8f9fa; font-weight: 500; color: #666; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-admin { background: #fff2e8; color: #fa8c16; }
        .tag-user { background: #e6f7ff; color: #1890ff; }
        .tag-pending { background: #fffbe6; color: #faad14; }
        .btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #52c41a; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .empty-tip { text-align: center; padding: 40px; color: #999; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 16px; border-radius: 8px; text-align: center; }
        .stat-box .number { font-size: 24px; font-weight: 600; color: #667eea; }
        .stat-box .label { font-size: 12px; color: #999; margin-top: 4px; }
        
        /* 设置卡片 */
        .setting-card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .setting-header { font-weight: 500; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .rates-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .rate-tag { display: inline-flex; align-items: center; padding: 6px 12px; background: #f5f5f5; border-radius: 16px; font-size: 14px; }
        .rate-tag .del { margin-left: 8px; color: #999; cursor: pointer; font-size: 16px; }
        .rate-tag .del:hover { color: #ff4d4f; }
        .add-form { display: flex; gap: 8px; align-items: center; }
        .add-form input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        /* 用户审批 */
        .user-item { display: flex; align-items: center; padding: 12px; background: white; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .user-item .info { flex: 1; }
        .user-item .username { font-weight: 500; }
        .user-item .company { font-size: 12px; color: #999; margin-top: 2px; }
        .user-item .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 管理后台</h1>
        <span onclick="logout()" style="font-size:14px;cursor:pointer;">退出登录</span>
    </div>
    
    <div class="admin-tabs">
        <div class="admin-tab active" data-tab="users">用户管理</div>
        <div class="admin-tab" data-tab="tax">税率设置</div>
        <div class="admin-tab" data-tab="stats">数据统计</div>
    </div>
    
    <!-- 用户管理 -->
    <div class="tab-content active" id="users-tab">
        <div class="section-title">待审核用户</div>
        <div id="pending-users"><div class="empty-tip">加载中...</div></div>
        
        <div class="section-title" style="margin-top:24px;">已审核用户</div>
        <div id="approved-users"><div class="empty-tip">加载中...</div></div>
    </div>
    
    <!-- 税率设置 -->
    <div class="tab-content" id="tax-tab">
        <div class="section-title">发票类型与税率点数</div>
        
        <div class="setting-card">
            <div class="setting-header">发票类型</div>
            <div class="rates-list" id="invoice-types-list"><span style="color:#999;">暂无发票类型</span></div>
            <div class="add-form">
                <input type="text" id="new-invoice-type" placeholder="输入发票类型名称" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
                <button class="btn-small btn-primary" onclick="addInvoiceType()">添加</button>
            </div>
        </div>
        
        <div class="setting-card">
            <div class="setting-header">税率点数</div>
            <div class="rates-list" id="tax-rates-list"><span style="color:#999;">暂无税率点数</span></div>
            <div class="add-form">
                <input type="number" id="new-tax-rate" placeholder="输入税率（如：9）" min="0" max="100" step="0.1" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
                <span>%</span>
                <button class="btn-small btn-primary" onclick="addTaxRate()">添加</button>
            </div>
        </div>
    </div>
    
    <!-- 数据统计 -->
    <div class="tab-content" id="stats-tab">
        <div class="section-title">系统概览</div>
        <div class="stats-grid">
            <div class="stat-box"><div class="number" id="stat-companies">0</div><div class="label">公司</div></div>
            <div class="stat-box"><div class="number" id="stat-users">0</div><div class="label">用户</div></div>
            <div class="stat-box"><div class="number" id="stat-projects">0</div><div class="label">项目</div></div>
            <div class="stat-box"><div class="number" id="stat-costs">0</div><div class="label">成本记录</div></div>
        </div>
    </div>

    <script>
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Content-Type': 'application/json' };
        
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) { window.location.href = 'login.html'; }
        var currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'admin') { alert('无权访问'); window.location.href = '../index.html'; }
        
        var allUsers = [], allCompanies = [];
        var invoiceTypes = [], taxRates = [];
        
        // Tab 切换
        document.querySelectorAll('.admin-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById(this.dataset.tab + '-tab').classList.add('active');
            });
        });
        
        function logout() { localStorage.removeItem('pm_user'); window.location.href = 'login.html'; }
        
        // ========== 用户管理 ==========
        function loadUsers() {
            Promise.all([
                fetch(CLOUD_URL + '/rest/v1/users?select=*', { headers: hdrs }).then(function(r) { return r.json(); }),
                fetch(CLOUD_URL + '/rest/v1/companies?select=*', { headers: hdrs }).then(function(r) { return r.json(); })
            ]).then(function(results) {
                allUsers = results[0] || [];
                allCompanies = results[1] || [];
                
                var pending = allUsers.filter(function(u) { return u.approved === false || u.approved === null; });
                var approved = allUsers.filter(function(u) { return u.approved === true; });
                
                renderPendingUsers(pending);
                renderApprovedUsers(approved);
            });
        }
        
        function getCompanyName(companyid) {
            var c = allCompanies.find(function(x) { return x.id === companyid; });
            return c ? c.name : '-';
        }
        
        function renderPendingUsers(users) {
            var container = document.getElementById('pending-users');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无待审核用户</div>';
                return;
            }
            container.innerHTML = users.map(function(u) {
                return '<div class="user-item">' +
                    '<div class="info"><div class="username">' + u.username + '</div><div class="company">公司: ' + getCompanyName(u.companyid) + '</div></div>' +
                    '<div class="actions">' +
                        '<button class="btn-small btn-success" onclick="approveUser(\'' + u.id + '\')">通过</button>' +
                        '<button class="btn-small btn-danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function renderApprovedUsers(users) {
            var container = document.getElementById('approved-users');
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-tip">暂无已审核用户</div>';
                return;
            }
            container.innerHTML = users.map(function(u) {
                var roleTag = u.role === 'admin' ? '<span class="tag tag-admin">管理员</span>' : '<span class="tag tag-user">普通用户</span>';
                return '<div class="user-item">' +
                    '<div class="info"><div class="username">' + u.username + ' ' + roleTag + '</div><div class="company">公司: ' + getCompanyName(u.companyid) + '</div></div>' +
                    '<div class="actions">' +
                        '<button class="btn-small btn-primary" onclick="showEditPwd(\'' + u.id + '\',\'' + u.username + '\')">改密</button>' +
                        (u.role !== 'admin' ? '<button class="btn-small btn-danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' : '') +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        function approveUser(userId) {
            fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, {
                method: 'PATCH', headers: hdrs, body: JSON.stringify({ approved: true })
            }).then(function() { loadUsers(); });
        }
        
        function deleteUser(userId) {
            if (!confirm('确定删除该用户？')) return;
            fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, { method: 'DELETE', headers: hdrs })
                .then(function() { loadUsers(); });
        }
        
        function showEditPwd(userId, username) {
            var pwd = prompt(username + ' 的新密码（留空则不修改）:');
            if (pwd && pwd.length >= 6) {
                var hash = 0;
                for (var i = 0; i < pwd.length; i++) {
                    var char = pwd.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                var pwdHash = 'pm_' + Math.abs(hash).toString(16);
                fetch(CLOUD_URL + '/rest/v1/users?id=eq.' + userId, {
                    method: 'PATCH', headers: hdrs, body: JSON.stringify({ passwordhash: pwdHash })
                }).then(function() { alert('密码已修改'); loadUsers(); });
            } else if (pwd && pwd.length < 6) {
                alert('密码至少6个字符');
            }
        }
        
        // ========== 税率设置 ==========
        // 发票类型存储在 taxsettings 表，type='invoice_type'
        // 税率点数存储在 taxsettings 表，type='tax_rate'
        
        function loadTaxSettings() {
            fetch(CLOUD_URL + '/rest/v1/taxsettings?select=*', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    data = data || [];
                    invoiceTypes = data.filter(function(t) { return t.type === 'invoice_type'; }).map(function(t) { return { id: t.id, name: t.name }; });
                    taxRates = data.filter(function(t) { return t.type === 'tax_rate'; }).map(function(t) { return { id: t.id, rate: parseFloat(t.rate) || 0 }; });
                    renderInvoiceTypes();
                    renderTaxRates();
                });
        }
        
        function renderInvoiceTypes() {
            var container = document.getElementById('invoice-types-list');
            if (invoiceTypes.length === 0) {
                container.innerHTML = '<span style="color:#999;">暂无发票类型</span>';
                return;
            }
            container.innerHTML = invoiceTypes.map(function(t) {
                return '<span class="rate-tag">' + t.name + '<span class="del" onclick="deleteInvoiceType(\'' + t.id + '\')">×</span></span>';
            }).join('');
        }
        
        function renderTaxRates() {
            var container = document.getElementById('tax-rates-list');
            if (taxRates.length === 0) {
                container.innerHTML = '<span style="color:#999;">暂无税率点数</span>';
                return;
            }
            container.innerHTML = taxRates.map(function(t) {
                return '<span class="rate-tag">' + t.rate + '%<span class="del" onclick="deleteTaxRate(\'' + t.id + '\')">×</span></span>';
            }).join('');
        }
        
        function addInvoiceType() {
            var input = document.getElementById('new-invoice-type');
            var name = input.value.trim();
            if (!name) { alert('请输入发票类型名称'); return; }
            
            // 检查是否已存在
            if (invoiceTypes.some(function(t) { return t.name === name; })) {
                alert('该发票类型已存在');
                return;
            }
            
            fetch(CLOUD_URL + '/rest/v1/taxsettings', {
                method: 'POST', headers: hdrs,
                body: JSON.stringify({ type: 'invoice_type', name: name })
            }).then(function(r) {
                if (r.ok) { input.value = ''; loadTaxSettings(); }
            });
        }
        
        function deleteInvoiceType(id) {
            if (!confirm('删除该发票类型？')) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + id, { method: 'DELETE', headers: hdrs })
                .then(function() { loadTaxSettings(); });
        }
        
        function addTaxRate() {
            var input = document.getElementById('new-tax-rate');
            var rate = parseFloat(input.value);
            if (!rate || rate <= 0 || rate > 100) {
                alert('请输入有效的税率（0-100）');
                return;
            }
            
            // 检查是否已存在
            if (taxRates.some(function(t) { return Math.abs(t.rate - rate) < 0.01; })) {
                alert('该税率已存在');
                return;
            }
            
            fetch(CLOUD_URL + '/rest/v1/taxsettings', {
                method: 'POST', headers: hdrs,
                body: JSON.stringify({ type: 'tax_rate', rate: rate / 100, name: rate + '%' })
            }).then(function(r) {
                if (r.ok) { input.value = ''; loadTaxSettings(); }
            });
        }
        
        function deleteTaxRate(id) {
            if (!confirm('删除该税率点数？')) return;
            fetch(CLOUD_URL + '/rest/v1/taxsettings?id=eq.' + id, { method: 'DELETE', headers: hdrs })
                .then(function() { loadTaxSettings(); });
        }
        
        // ========== 数据统计 ==========
        function loadStats() {
            document.getElementById('stat-users').textContent = allUsers.length;
            fetch(CLOUD_URL + '/rest/v1/companies?select=*', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(c) { document.getElementById('stat-companies').textContent = c.length; });
            fetch(CLOUD_URL + '/rest/v1/projects?select=id', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(p) { document.getElementById('stat-projects').textContent = p.length; });
            fetch(CLOUD_URL + '/rest/v1/costs?select=id', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(c) { document.getElementById('stat-costs').textContent = c.length; });
        }
        
        // 初始化
        loadUsers();
        loadTaxSettings();
        loadStats();
    </script>
</body>
</html>
