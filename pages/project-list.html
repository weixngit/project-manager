    <script src="../js/storage.js"></script>

    <script>
        // و£€وں¥ç™»ه½?        const userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        const currentUser = JSON.parse(userStr);
        
        const CLOUD = {
            url: 'https://azspvriaxhlllgtphwgv.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc'
        };
        const hdrs = { 'apikey': CLOUD.key, 'Authorization': 'Bearer ' + CLOUD.key };
        
        let currentFilter = 'all';
        let searchKeyword = '';

        async function syncFromCloud() {
            try {
                const rp = await fetch(CLOUD.url + '/rest/v1/projects?companyid=eq.' + currentUser.companyId + '&order=updatedat.desc', { headers: hdrs });
                const projects = await rp.json();
                if (projects && projects.length > 0) {
                    Storage.set(Storage.KEYS.PROJECTS, projects.map(p => ({
                        id: p.id, name: p.name, contractAmount: p.contractamount,
                        client: p.client||'', clientContact: p.clientcontact||'',
                        clientPhone: p.clientphone||'', clientAddress: p.clientaddress||'',
                        manager: p.manager||'', managerPhone: p.managerphone||'',
                        startDate: p.startdate||'', endDate: p.enddate||'',
                        status: p.status||'è؟›è،Œن¸?, progress: p.progress||0,
                        invoiceType: p.invoicetype||'', taxAmount: p.taxamount||0,
                        remark: p.remark||'', createdAt: p.createdat||'', updatedAt: p.updatedat||''
                    })));
                }
                
                const rc = await fetch(CLOUD.url + '/rest/v1/costs?order=createdat.desc', { headers: hdrs });
                const costs = await rc.json();
                if (costs && costs.length > 0) {
                    Storage.set(Storage.KEYS.COSTS, costs.map(c => ({
                        id: c.id, projectId: c.projectid, type: c.type,
                        amount: c.amount, date: c.date||'', remark: c.remark||'', createdAt: c.createdat||''
                    })));
                }
                
                const rpay = await fetch(CLOUD.url + '/rest/v1/payments?order=expecteddate.desc', { headers: hdrs });
                const payments = await rpay.json();
                if (payments && payments.length > 0) {
                    Storage.set(Storage.KEYS.PAYMENTS, payments.map(p => ({
                        id: p.id, projectId: p.projectid, amount: p.amount, type: p.type||'final',
                        expectedDate: p.expecteddate||'', actualDate: (p.actualdate && p.actualdate !== 'null') ? p.actualdate : '',
                        remark: p.remark||'', createdAt: p.createdat||''
                    })));
                }
            } catch(e) { console.error('هگŒو­¥ه¤±è´¥', e); }
        }

        function loadProjects() {
            const container = document.getElementById('project-list');
            let projects = ProjectStore.getAll();
            
            // ه…ˆوک¾ç¤؛وœ¬هœ°و•°وچ®ï¼ˆç«‹هچ³هڈ¯ç”¨ï¼?            renderProjects(projects);
            
            // ç„¶هگژن»ژن؛‘ç«¯èژ·هڈ–و•°وچ®è؟›è،Œهگˆه¹?            fetch(CLOUD.url + '/rest/v1/projects?order=updatedat.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(cloudProjects) {
                    if (cloudProjects && cloudProjects.length > 0) {
                        var localIds = projects.map(function(p) { return p.id; });
                        var newProjects = cloudProjects.filter(function(cp) { return localIds.indexOf(cp.id) === -1; });
                        
                        // هڈھو·»هٹ ن؛‘ç«¯وœ‰ن½†وœ¬هœ°و²،وœ‰çڑ„é،¹ç›®
                        if (newProjects.length > 0) {
                            var newLocal = newProjects.map(function(p) {
                                return {
                                    id: p.id, name: p.name, contractAmount: p.contractamount,
                                    client: p.client||'', clientContact: p.clientcontact||'',
                                    clientPhone: p.clientphone||'', clientAddress: p.clientaddress||'',
                                    manager: p.manager||'', managerPhone: p.managerphone||'',
                                    startDate: p.startdate||'', endDate: p.enddate||'',
                                    status: p.status||'è؟›è،Œن¸?, progress: p.progress||0,
                                    invoiceType: p.invoicetype||'', taxAmount: p.taxamount||0,
                                    remark: p.remark||'', createdAt: p.createdat||'', updatedAt: p.updatedat||''
                                };
                            });
                            
                            var allProjects = projects.concat(newLocal);
                            Storage.set(Storage.KEYS.PROJECTS, allProjects);
                            renderProjects(allProjects);
                        }
                    }
                })
                .catch(function(e) { console.error('merge failed', e); });
        }
        
        function renderProjects(projects) {
            const container = document.getElementById('project-list');
            if (currentFilter !== 'all') projects = projects.filter(p => p.status === currentFilter);
            if (searchKeyword) projects = projects.filter(p => p.name.includes(searchKeyword) || (p.client && p.client.includes(searchKeyword)));

            if (projects.length === 0) {
                container.innerHTML = '<div class="empty-tip"><p style="font-size:48px;margin-bottom:16px;">ًں“پ</p><p>وڑ‚و— é،¹ç›®</p><p style="font-size:12px;color:#999;margin-top:8px;">ç‚¹ه‡»هڈ³ن¸‹è§?+ و–°ه»؛é،¹ç›®</p></div>';
                return;
            }

            container.innerHTML = projects.map(p => {
                const profit = Utils.calculateProfit(p.id);
                const totalPaid = PaymentStore.getTotalPaid(p.id);
                return '<a href="project-detail.html?id=' + p.id + '" class="list-item">' +
                    '<div class="list-item-content">' +
                    '<div class="list-item-title">' + p.name + '</div>' +
                    '<div class="list-item-subtitle">هگˆهگŒ: ' + Utils.formatMoney(p.contractAmount) + ' | هˆ©و¶¦: <span class="' + (profit && profit.profit >= 0 ? 'profit-positive' : 'profit-negative') + '">' + (profit ? Utils.formatMoney(profit.profit) : 'آ¥0') + '</span></div>' +
                    '<div style="margin-top:8px;"><div class="progress-bar" style="width:100%;"><div class="progress-fill" style="width:' + (p.progress||0) + '%;"></div></div>' +
                    '<div style="font-size:11px;color:#999;margin-top:4px;">ه›‍و¬¾: ' + Utils.formatMoney(totalPaid) + ' / ' + Utils.formatMoney(p.contractAmount||0) + '</div></div>' +
                    '</div><span class="tag ' + Utils.getStatusTag(p.status) + '">' + p.status + '</span></a>';
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.status;
                loadProjects();
            });
        });

        document.getElementById('search-input').addEventListener('input', Utils.debounce(function(e) {
            searchKeyword = e.target.value;
            loadProjects();
        }, 300));

        // هˆ‌ه§‹هٹ è½½و—¶ه…ˆوک¾ç¤؛وœ¬هœ°و•°وچ®
        loadProjects();
