<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>票据管理 - 工程项目管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            width: 100%;
            max-height: 85vh;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .form-row {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .amount-input {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            padding: 16px;
            border: 2px solid #1890ff;
            border-radius: 12px;
        }
        .type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .type-btn {
            padding: 14px 8px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fff;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .type-btn:active, .type-btn.selected {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }
        .save-btn {
            width: 100%;
            padding: 16px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        .cancel-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #666;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
        }
        .invoice-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
        }
        .invoice-left {
            flex: 1;
        }
        .invoice-project {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .invoice-info {
            font-size: 12px;
            color: #999;
        }
        .invoice-amount {
            font-size: 16px;
            font-weight: bold;
            margin-right: 12px;
        }
        .invoice-in {
            color: #52c41a;
        }
        .invoice-out {
            color: #1890ff;
        }
        .invoice-delete {
            color: #999;
            font-size: 20px;
            padding: 4px 8px;
        }
        .invoice-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f6ffed;
            border-top: 2px solid #52c41a;
        }
        .invoice-total-label {
            font-size: 14px;
            color: #52c41a;
        }
        .invoice-total-amount {
            font-size: 18px;
            font-weight: bold;
            color: #52c41a;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #fff;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            background: #fff;
            font-size: 13px;
        }
        .page-btn:disabled {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <a href="../index.html" class="back-btn">←</a>
            <h2 class="page-title">票据管理</h2>
        </div>

        <div style="padding: 16px 16px 8px; background: #fff;">
            <button id="add-btn" style="width: 100%; padding: 12px; background: #1890ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold;">+ 添加票据记录</button>
        </div>

        <div style="padding: 0 16px 12px; background: #fff;">
            <select id="project-select" class="form-input">
                <option value="">全部项目</option>
            </select>
        </div>

        <div class="main-content" style="padding-top: 0;">
            <div id="invoice-list"></div>
        </div>
    </div>

    <!-- 新增票据弹窗 -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-box">
            <div class="modal-handle"></div>
            <h3 style="text-align:center;margin-bottom:16px;">添加票据</h3>
            
            <div class="form-row">
                <label class="form-label">选择项目</label>
                <select id="invoice-project" class="form-input">
                    <option value="">选择项目...</option>
                </select>
            </div>

            <div class="form-row">
                <label class="form-label">票据类型</label>
                <div class="type-grid">
                    <button class="type-btn selected" data-type="收到" id="type-in">收到</button>
                    <button class="type-btn" data-type="开出" id="type-out">开出</button>
                </div>
            </div>

            <div class="form-row">
                <label class="form-label">金额（元）</label>
                <input type="number" id="invoice-amount" class="form-input amount-input" placeholder="0.00" step="0.01">
            </div>

            <div class="form-row">
                <label class="form-label">发票号（选填）</label>
                <input type="text" id="invoice-number" class="form-input" placeholder="输入发票号">
            </div>

            <div class="form-row">
                <label class="form-label">日期</label>
                <input type="date" id="invoice-date" class="form-input">
            </div>

            <div class="form-row">
                <label class="form-label">对方单位（选填）</label>
                <input type="text" id="invoice-party" class="form-input" placeholder="输入对方单位">
            </div>

            <div class="form-row">
                <label class="form-label">备注（选填）</label>
                <input type="text" id="invoice-remark" class="form-input" placeholder="输入备注">
            </div>

            <button class="save-btn" id="save-btn">保存</button>
            <button class="cancel-btn" id="cancel-btn">取消</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 检查登录
        var userStr = localStorage.getItem('pm_user');
        if (!userStr) {
            window.location.href = 'login.html';
        }
        var currentUser = JSON.parse(userStr);
        
        var CLOUD_URL = 'https://azspvriaxhlllgtphwgv.supabase.co';
        var CLOUD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3B2cmlheGhsbGxndHBod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTM1OTMsImV4cCI6MjA5MDQyOTU5M30.6F3W6dYQ8DdtWRFBGBIejcms2XCvdMxWBvmOX_AMlAc';
        var hdrs = { 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY };
        
        var currentProjectId = '';
        var selectedType = '收到';
        var currentPage = 1;
        var pageSize = 10;

        function syncFromCloud() {
            fetch(CLOUD_URL + '/rest/v1/projects?company_id=eq.' + currentUser.companyId + '&order=updated_at.desc', { headers: hdrs })
                .then(function(r) { return r.json(); })
                .then(function(cloudProjects) {
                    if (cloudProjects && cloudProjects.length > 0) {
                        Storage.set(Storage.KEYS.PROJECTS, cloudProjects.map(function(p) {
                            return { id: p.id, name: p.name, contractAmount: p.contract_amount, client: p.client||'', clientContact: p.client_contact||'', clientPhone: p.client_phone||'', clientAddress: p.client_address||'', manager: p.manager||'', managerPhone: p.manager_phone||'', startDate: p.start_date||'', endDate: p.end_date||'', status: p.status||'进行中', progress: p.progress||0, invoiceType: p.invoice_type||'', taxAmount: p.tax_amount||0, remark: p.remark||'', createdAt: p.created_at||'', updatedAt: p.updated_at||'' };
                        }));
                    }
                    return fetch(CLOUD_URL + '/rest/v1/invoices?company_id=eq.' + currentUser.companyId + '&order=date.desc', { headers: hdrs });
                })
                .then(function(r) { return r.json(); })
                .then(function(cloudInvoices) {
                    if (cloudInvoices && cloudInvoices.length > 0) {
                        Storage.set(Storage.KEYS.INVOICES, cloudInvoices.map(function(i) {
                            return { id: i.id, projectId: i.project_id, type: i.type, amount: i.amount, number: i.number||'', date: i.date||'', party: i.party||'', remark: i.remark||'', createdAt: i.created_at||'' };
                        }));
                    }
                    loadProjects();
                })
                .catch(function(e) { loadProjects(); });
        }

        function loadProjects() {
            var projects = ProjectStore.getAll();
            var select = document.getElementById('project-select');
            var modalSelect = document.getElementById('invoice-project');
            select.innerHTML = '<option value="">全部项目</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            modalSelect.innerHTML = '<option value="">选择项目...</option>' + projects.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
            currentPage = 1;
            loadInvoices();
        }

        function loadInvoices() {
            var container = document.getElementById('invoice-list');
            var allInvoices = InvoiceStore.getAll();
            
            if (currentProjectId) {
                allInvoices = allInvoices.filter(function(i) { return i.projectId === currentProjectId; });
            }
            
            allInvoices.sort(function(a, b) { return new Date(b.date || 0) - new Date(a.date || 0); });
            
            var totalIn = 0;
            var totalOut = 0;
            allInvoices.forEach(function(i) {
                if (i.type === '收到') {
                    totalIn += parseFloat(i.amount) || 0;
                } else {
                    totalOut += parseFloat(i.amount) || 0;
                }
            });
            
            var totalPages = Math.max(1, Math.ceil(allInvoices.length / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * pageSize;
            var pageInvoices = allInvoices.slice(start, start + pageSize);

            if (allInvoices.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;"><p style="font-size:48px;margin-bottom:12px;">🧾</p><p>暂无票据记录</p><p style="font-size:12px;margin-top:8px;">点击上方 + 添加</p></div>';
                return;
            }

            var html = '';
            pageInvoices.forEach(function(i) {
                var project = ProjectStore.getById(i.projectId);
                var projectName = project ? project.name : '未知项目';
                var isIn = i.type === '收到';
                html += '<div class="invoice-item">' +
                    '<div class="invoice-left">' +
                        '<div class="invoice-project">' + (isIn ? '📥' : '📤') + ' ' + projectName + ' <span style="font-size:11px;color:#666;background:#f0f0f0;padding:2px 6px;border-radius:4px;">' + i.type + '</span></div>' +
                        '<div class="invoice-info">' + i.date + (i.number ? ' | ' + i.number : '') + (i.party ? ' | ' + i.party : '') + '</div>' +
                    '</div>' +
                    '<div class="invoice-amount ' + (isIn ? 'invoice-in' : 'invoice-out') + '">¥' + parseFloat(i.amount).toLocaleString() + '</div>' +
                    '<div class="invoice-delete" onclick="deleteInvoice(\'' + i.id + '\')">×</div>' +
                '</div>';
            });
            
            if (totalPages > 1) {
                html += '<div class="pagination">' +
                    '<button class="page-btn" onclick="prevPage()" ' + (currentPage <= 1 ? 'disabled' : '') + '>上一页</button>' +
                    '<span style="font-size:13px;color:#666;">' + currentPage + ' / ' + totalPages + '</span>' +
                    '<button class="page-btn" onclick="nextPage()" ' + (currentPage >= totalPages ? 'disabled' : '') + '>下一页</button>' +
                '</div>';
            }
            
            html += '<div class="invoice-total">' +
                '<span class="invoice-total-label">收到: ¥' + totalIn.toLocaleString() + ' | 开出: ¥' + totalOut.toLocaleString() + '</span>' +
            '</div>';
            
            container.innerHTML = html;
        }

        function prevPage() { currentPage--; loadInvoices(); }
        function nextPage() { currentPage++; loadInvoices(); }

        function showModal() {
            document.getElementById('invoice-project').value = currentProjectId || '';
            document.getElementById('invoice-amount').value = '';
            document.getElementById('invoice-number').value = '';
            document.getElementById('invoice-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('invoice-party').value = '';
            document.getElementById('invoice-remark').value = '';
            
            // 根据项目自动选择发票类型
            var project = ProjectStore.getById(currentProjectId);
            if (project && project.invoiceType) {
                // 如果项目是一般纳税人，开票应该选"开出"
                // 如果是收款方是对方，选"收到"
                selectedType = '开出'; // 默认开票给甲方
            } else {
                selectedType = '收到';
            }
            updateTypeButtons();
            document.getElementById('add-modal').classList.add('show');
        }
        
        function updateTypeButtons() {
            if (selectedType === '收到') {
                document.getElementById('type-in').classList.add('selected');
                document.getElementById('type-out').classList.remove('selected');
            } else {
                document.getElementById('type-in').classList.remove('selected');
                document.getElementById('type-out').classList.add('selected');
            }
        }

        function hideModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        document.getElementById('add-btn').addEventListener('click', showModal);
        document.getElementById('cancel-btn').addEventListener('click', hideModal);
        document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) hideModal(); });

        document.getElementById('type-in').addEventListener('click', function() {
            selectedType = '收到';
            this.classList.add('selected');
            document.getElementById('type-out').classList.remove('selected');
        });
        document.getElementById('type-out').addEventListener('click', function() {
            selectedType = '开出';
            this.classList.add('selected');
            document.getElementById('type-in').classList.remove('selected');
        });

        document.getElementById('save-btn').addEventListener('click', function() {
            var projectId = document.getElementById('invoice-project').value;
            var amount = document.getElementById('invoice-amount').value;
            var number = document.getElementById('invoice-number').value;
            var date = document.getElementById('invoice-date').value;
            var party = document.getElementById('invoice-party').value;
            var remark = document.getElementById('invoice-remark').value;
            
            if (!projectId) { Utils.showToast('请选择项目'); return; }
            if (!amount || parseFloat(amount) <= 0) { Utils.showToast('请输入金额'); return; }
            if (!date) { Utils.showToast('请选择日期'); return; }

            var invoice = InvoiceStore.add({ projectId: projectId, type: selectedType, amount: amount, number: number, date: date, party: party, remark: remark });

            // 如果是"开出"发票，从云端获取税率设置并计算税费
            if (selectedType === '开出') {
                var project = ProjectStore.getById(projectId);
                if (project && project.invoiceType) {
                    // 从云端获取税率设置
                    fetch(CLOUD_URL + '/rest/v1/tax_settings?invoice_type=eq.' + encodeURIComponent(project.invoiceType), { headers: hdrs })
                        .then(function(r) { return r.json(); })
                        .then(function(taxSettings) {
                            if (taxSettings && taxSettings.length > 0) {
                                var tax = taxSettings[0];
                                var invoiceAmount = parseFloat(amount) || 0;
                                var vatRate = parseFloat(tax.vat_rate) || 0;
                                var incomeTaxRate = parseFloat(tax.income_tax_rate) || 0;
                                var surtaxRate = parseFloat(tax.surtax_rate) || 0;
                                
                                var vat = invoiceAmount * vatRate;
                                var incomeTax = invoiceAmount * incomeTaxRate;
                                var surtax = vat * surtaxRate;
                                var totalTax = Math.round(vat + incomeTax + surtax);
                                
                                if (totalTax > 0) {
                                    var taxCost = CostStore.add({
                                        projectId: projectId,
                                        type: 'other',
                                        amount: totalTax,
                                        date: date,
                                        remark: '税费（发票' + number + '，' + project.invoiceType + '）'
                                    });
                                    
                                    fetch(CLOUD_URL + '/rest/v1/costs', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                                        body: JSON.stringify({ id: taxCost.id, project_id: taxCost.projectId, type: taxCost.type, amount: taxCost.amount, date: taxCost.date, remark: taxCost.remark || '', company_id: currentUser.companyId })
                                    }).catch(function(e) {});
                                    
                                    Utils.showToast('添加成功，税费 ¥' + totalTax.toLocaleString() + ' 已计入成本');
                                } else {
                                    Utils.showToast('添加成功');
                                }
                            } else {
                                Utils.showToast('添加成功（未找到税率设置）');
                            }
                        })
                        .catch(function(e) {
                            Utils.showToast('添加成功');
                        });
                } else {
                    Utils.showToast('添加成功（项目未设置开票类型）');
                }
            } else {
                Utils.showToast('添加成功');
            }

            // 同步发票到云端
            fetch(CLOUD_URL + '/rest/v1/invoices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': CLOUD_KEY, 'Authorization': 'Bearer ' + CLOUD_KEY, 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({ id: invoice.id, project_id: invoice.projectId, type: invoice.type, amount: parseFloat(invoice.amount) || 0, number: invoice.number || '', date: invoice.date, party: invoice.party || '', remark: invoice.remark || '', company_id: currentUser.companyId })
            }).catch(function(e) {});

            hideModal();
            loadInvoices();
        });

        function deleteInvoice(id) {
            if (confirm('确定要删除这条记录吗？')) {
                InvoiceStore.delete(id);
                fetch(CLOUD_URL + '/rest/v1/invoices?id=eq.' + id, { method: 'DELETE', headers: hdrs }).catch(function(e) {});
                Utils.showToast('已删除');
                loadInvoices();
            }
        }

        document.getElementById('project-select').addEventListener('change', function() {
            currentProjectId = this.value;
            currentPage = 1;
            loadInvoices();
        });

        syncFromCloud();
    </script>
</body>
</html>
